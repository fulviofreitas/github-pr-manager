<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PR Approver — Bulk Approve GitHub Pull Requests</title>
    <meta name="description" content="Quickly approve GitHub PRs and manage review labels. No installation required.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✅</text></svg>">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsrsasign/11.1.0/jsrsasign-all-min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
:root {
    /* Warm midnight theme with coral accents */
    --bg0: #1a1625;
    --bg1: #231e2e;
    --bg2: #2d2640;
    --bg3: #3d3554;
    --bg4: #524a6a;
    --hover: #352f45;
    --border: #3d3554;
    --border2: #2d2640;
    --t0: #f5f0fa;
    --t1: #d4cce0;
    --t2: #9f94b3;
    --t3: #716886;
    --acc: #ff7b72;
    --acc2: #ff5c4d;
    --accbg: rgba(255, 123, 114, 0.12);
    --green: #7ee787;
    --green-bg: rgba(126, 231, 135, 0.15);
    --red: #ff6b6b;
    --red-bg: rgba(255, 107, 107, 0.15);
    --orange: #ffa657;
    --orange-bg: rgba(255, 166, 87, 0.15);
    --purple: #d2a8ff;
    --purple-bg: rgba(210, 168, 255, 0.15);
    --cyan: #79c0ff;
    --pink: #ff9ec3;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'IBM Plex Mono', monospace;
    background: var(--bg0);
    color: var(--t0);
    min-height: 100vh;
}

.app {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

/* Header */
.header {
    background: var(--bg1);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
}

.toolbar {
    background: transparent;
    padding: 24px;
    max-width: 1400px;
    margin: 0 auto;
    width: 100%;
}

.repo-inputs-container {
    display: flex;
    flex-direction: column;
    gap: 6px;
}

.logo {
    display: flex;
    align-items: center;
    gap: 12px;
}

.logo-mark {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, var(--acc), var(--purple));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
}

.logo-text {
    font-size: 18px;
    font-weight: 700;
    color: var(--acc);
}

.logo-sub {
    font-size: 11px;
    color: var(--t3);
    margin-left: 8px;
}

/* Input Group */
.input-section {
    display: flex;
    gap: 12px;
    flex: 1;
    flex-wrap: wrap;
    align-items: center;
}

.input-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
}

.input-label {
    font-size: 10px;
    color: var(--t3);
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.input-field {
    padding: 10px 14px;
    background: var(--bg0);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--t0);
    font-family: inherit;
    font-size: 12px;
    min-width: 280px;
    transition: border-color 0.2s, box-shadow 0.2s;
}

.input-field:focus {
    outline: none;
    border-color: var(--acc);
    box-shadow: 0 0 0 3px var(--accbg);
}

.input-field.small {
    min-width: 200px;
}

.input-field::placeholder {
    color: var(--t3);
}

.btn {
    padding: 10px 20px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--t1);
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.2s;
    white-space: nowrap;
}

.btn:hover:not(:disabled) {
    background: var(--bg4);
    border-color: var(--acc);
    color: var(--acc);
}

.btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

.btn.primary {
    background: var(--acc);
    color: var(--bg0);
    border-color: var(--acc);
    font-weight: 600;
}

.btn.primary:hover:not(:disabled) {
    background: var(--acc2);
    border-color: var(--acc2);
    color: var(--bg0);
}

.btn.danger {
    background: var(--red-bg);
    color: var(--red);
    border-color: var(--red);
}

.btn.danger:hover:not(:disabled) {
    background: var(--red);
    color: white;
}

/* Main Content */
.main {
    flex: 1;
    padding: 24px;
    max-width: 1400px;
    margin: 0 auto;
    width: 100%;
}

/* Welcome Screen */
.welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 24px;
    text-align: center;
}

.welcome-icon {
    font-size: 64px;
    margin-bottom: 24px;
}

.welcome-title {
    font-size: 28px;
    font-weight: 700;
    color: var(--t0);
    margin-bottom: 12px;
}

.welcome-desc {
    font-size: 14px;
    color: var(--t2);
    max-width: 500px;
    line-height: 1.6;
}

.welcome-steps {
    display: flex;
    gap: 24px;
    margin-top: 48px;
    flex-wrap: wrap;
    justify-content: center;
}

.welcome-step {
    background: var(--bg1);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    width: 200px;
    text-align: center;
}

.step-num {
    width: 32px;
    height: 32px;
    background: var(--accbg);
    border: 1px solid var(--acc);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    color: var(--acc);
    margin: 0 auto 12px;
}

.step-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--t0);
    margin-bottom: 8px;
}

.step-desc {
    font-size: 11px;
    color: var(--t3);
    line-height: 1.5;
}

/* Loading */
.loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 24px;
}

.spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--acc);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

.loading-text {
    margin-top: 16px;
    font-size: 13px;
    color: var(--t2);
}

/* Error */
.error-box {
    background: var(--red-bg);
    border: 1px solid var(--red);
    border-radius: 12px;
    padding: 20px 24px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 24px;
}

.error-icon {
    font-size: 20px;
}

.error-content {
    flex: 1;
}

.error-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--red);
    margin-bottom: 4px;
}

.error-msg {
    font-size: 12px;
    color: var(--t2);
}

/* Stats Bar */
.stats-bar {
    display: flex;
    gap: 16px;
    margin-bottom: 24px;
    flex-wrap: wrap;
}

.stat-card {

    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    min-width: 140px;
}

.stat-value {

    font-weight: 700;
    color: var(--purple);
}

.stat-label {
    font-size: 10px;
    color: var(--t3);
    text-transform: uppercase;
    margin-top: 4px;
}

.stat-card.needs-review .stat-value {
    color: var(--orange);
}

.stat-card.success .stat-value {
    color: var(--green);
}

/* PR List */
.pr-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 12px;
}

.pr-title {
    font-size: 18px;
    font-weight: 600;
    color: var(--t0);
    display: flex;
    align-items: center;
    gap: 10px;
}

.pr-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-left: auto;
    justify-content: flex-end;
}

.filter-btn {
    padding: 8px 14px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--t2);
    font-family: inherit;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
}

.filter-btn:hover, .filter-btn.active {
    background: var(--accbg);
    border-color: var(--acc);
    color: var(--acc);

.auth-toggle {

    gap: 0;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--border);
}

.auth-toggle .filter-btn {
    border-radius: 0;
    border: none;
    border-right: 1px solid var(--border);
}

.auth-toggle .filter-btn:last-child {
    border-right: none;
}

.pr-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.pr-card {
    background: var(--bg1);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    transition: all 0.2s;
    cursor: pointer;
}

.pr-card:hover {
    border-color: var(--acc);
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
}

.pr-card.selected {
    border-color: var(--green);
    background: var(--green-bg);
}

.pr-card-header {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    margin-bottom: 12px;
}

.pr-checkbox {
    width: 20px;
    height: 20px;
    appearance: none;
    background: var(--bg0);
    border: 2px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    position: relative;
    flex-shrink: 0;
    margin-top: 2px;
}

.pr-checkbox:checked {

    border-color: var(--green);
}

.pr-checkbox:checked::after {
    content: '✓';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: var(--bg0);
    font-size: 12px;
    font-weight: 700;
}

.pr-info {
    flex: 1;
    min-width: 0;
}

.pr-number {
    font-size: 13px;
    font-weight: 600;
    color: var(--cyan);
}

.pr-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--t0);
    margin-top: 4px;
    line-height: 1.4;
    word-break: break-word;
}

.pr-meta {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-top: 10px;
    flex-wrap: wrap;
    font-size: 11px;
    color: var(--t3);
}

.pr-author {
    display: flex;
    align-items: center;
    gap: 6px;
}

.pr-author-avatar {
    width: 20px;
    height: 20px;
    border-radius: 50%;
}

.pr-labels {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 12px;
}

.label {
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 600;
    border: 1px solid transparent;
}

.label.needs-review {
    background: var(--orange-bg);
    color: var(--orange);
    border-color: var(--orange);
}

.pr-status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--t2);
    margin-left: auto;
}

.status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
}

.status-dot.pending {
    background: var(--orange);
}

/* Approval Modal */
.modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 24px;
}

.modal {
    background: var(--bg1);
    border: 1px solid var(--border);
    border-radius: 16px;
    max-width: 500px;
    width: 100%;
    max-height: 80vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
}

.modal-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.modal-title {
    font-size: 16px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 10px;
}

.modal-close {
    background: none;
    border: none;
    color: var(--t3);
    font-size: 20px;
    cursor: pointer;
    padding: 4px 8px;

}

.modal-close:hover {

    color: var(--t0);
}

.modal-body {
    padding: 24px;
    overflow-y: auto;
}

.modal-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 12px;
    justify-content: flex-end;
}

.approval-summary {
    background: var(--bg0);
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 20px;
}

.approval-count {
    font-size: 24px;
    font-weight: 700;
    color: var(--green);
}

.approval-text {
    font-size: 12px;
    color: var(--t2);
    margin-top: 4px;
}

.approval-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 200px;
    overflow-y: auto;
}

.approval-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: var(--bg2);
    border-radius: 6px;
    font-size: 12px;
}

.approval-item-status {
    font-size: 14px;
}

.approval-item-name {
    flex: 1;
    color: var(--t1);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.comment-input {
    width: 100%;
    padding: 12px;
    background: var(--bg0);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--t0);
    font-family: inherit;
    font-size: 12px;
    resize: vertical;
    min-height: 80px;
    margin-top: 16px;
}

.comment-input:focus {
    outline: none;
    border-color: var(--acc);
}

.checkbox-group {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 16px;
    font-size: 12px;
    color: var(--t1);
}

.checkbox-group input {
    width: 16px;
    height: 16px;
    accent-color: var(--green);

/* Toast */
.toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    padding: 14px 20px;
    background: var(--bg1);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 13px;
    color: var(--t0);
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    z-index: 2000;

.toast.success {
    border-color: var(--green);
}

.toast.error {
    border-color: var(--red);

@keyframes slideIn {
    from {
        transform: translateX(100%);
        opacity: 0;
    }
    to {
        transform: translateX(0);
        opacity: 1;

/* Empty State */
.empty-state {
    text-align: center;
    padding: 60px 24px;
    color: var(--t3);
}

.empty-icon {

    margin-bottom: 16px;
}

.empty-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--t2);

    .welcome-steps {
        flex-direction: column;
        align-items: center;
    }
    
    .stats-bar {
        flex-direction: column;
    }
    
    .stat-card {
        width: 100%;
    }
}

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

// GitHub API helper
const GitHubAPI = {
    baseUrl: 'https://api.github.com',
    
    parseRepoInput(input) {
        // Handle various formats:
        // - owner/repo
        // - https://github.com/owner/repo
        // - github.com/owner/repo
        // - https://github.com/owner/repo/pulls
        const cleaned = input.trim().replace(/\/$/, '');
        
        // Try URL format
        const urlMatch = cleaned.match(/(?:https?:\/\/)?(?:www\.)?github\.com\/([^\/]+)\/([^\/]+)/);
        if (urlMatch) {
            return { owner: urlMatch[1], repo: urlMatch[2].replace(/\.git$/, '') };
        }
        
        // Try owner/repo format
        const simpleMatch = cleaned.match(/^([^\/]+)\/([^\/]+)$/);
        if (simpleMatch) {
            return { owner: simpleMatch[1], repo: simpleMatch[2] };
        }
        
        return null;
    },
    
    async request(endpoint, token, options = {}) {
        const headers = {
            'Accept': 'application/vnd.github+json',
            'X-GitHub-Api-Version': '2022-11-28',
            ...options.headers,
        };
        
        // Only add Authorization header if token is provided
        if (token) {
            headers['Authorization'] = `Bearer ${token}`;
        }
        
        // Add Content-Type for requests with body
        if (options.body) {
            headers['Content-Type'] = 'application/json';
        }
        
        console.log(`[GitHub API] ${options.method || 'GET'} ${endpoint}`);
        
        const response = await fetch(`${this.baseUrl}${endpoint}`, {
            ...options,
            headers,
        });
        
        if (!response.ok) {
            const error = await response.json().catch(() => ({}));
            console.error(`[GitHub API] Error:`, error);
            // Include detailed error info if available
            let errorMsg = error.message || `GitHub API error: ${response.status}`;
            if (error.errors && error.errors.length > 0) {
                const details = error.errors.map(e => e.message || e.code || JSON.stringify(e)).join(', ');
                errorMsg += ` (${details})`;
                console.error(`[GitHub API] Error details:`, error.errors);
            }
            throw new Error(errorMsg);
        }
        
        if (response.status === 204) return null;
        return response.json();
    },
    
    async getPullRequests(owner, repo, state = 'open', token = null) {
        // Token optional - needed for private repos
        return this.request(`/repos/${owner}/${repo}/pulls?state=${state}&per_page=100`, token);
    },
    
    async getPullRequestReviews(owner, repo, prNumber, token = null) {
        // Token optional - needed for private repos
        return this.request(`/repos/${owner}/${repo}/pulls/${prNumber}/reviews`, token);
    },
    
    async approvePR(owner, repo, prNumber, token, comment = '', commitSha = null) {
        const body = {
            event: 'APPROVE',
        };
        
        // Only include body if there's a comment
        if (comment && comment.trim()) {
            body.body = comment.trim();
        }
        
        // Include commit_id if provided (required by some GitHub configurations)
        if (commitSha) {
            body.commit_id = commitSha;
        }
        
        console.log(`[GitHub API] Approving PR #${prNumber} with body:`, body);
        
        return this.request(`/repos/${owner}/${repo}/pulls/${prNumber}/reviews`, token, {
            method: 'POST',
            body: JSON.stringify(body),
        });
    },
    
    async removeLabel(owner, repo, issueNumber, labelName, token) {
        try {
            return this.request(
                `/repos/${owner}/${repo}/issues/${issueNumber}/labels/${encodeURIComponent(labelName)}`,
                token,
                { method: 'DELETE' }
            );
        } catch (e) {
            // Label might not exist, that's okay
            console.warn(`Could not remove label ${labelName}:`, e.message);
            return null;
        }
    },
    
    async validateToken(token) {
        return this.request('/user', token);
    },
    
    generateJWT(appId, privateKey) {
        // Create JWT for GitHub App authentication
        const now = Math.floor(Date.now() / 1000);
        const payload = {
            iat: now - 60, // Issued 60 seconds ago to account for clock drift
            exp: now + (10 * 60), // Expires in 10 minutes (max allowed)
            iss: String(appId),
        };
        
        const header = { alg: 'RS256', typ: 'JWT' };
        
        console.log('[GitHub App] Generating JWT for App ID:', appId);
        console.log('[GitHub App] Key format detected:', 
            privateKey.includes('BEGIN RSA PRIVATE KEY') ? 'PKCS#1 (RSA)' :
            privateKey.includes('BEGIN PRIVATE KEY') ? 'PKCS#8' :
            privateKey.includes('BEGIN EC PRIVATE KEY') ? 'EC' : 'Unknown'
        );
        
        try {
            // Use jsrsasign to sign the JWT
            // jsrsasign accepts PEM strings directly
            const jwt = KJUR.jws.JWS.sign('RS256', JSON.stringify(header), JSON.stringify(payload), privateKey);
            console.log('[GitHub App] JWT generated successfully, length:', jwt.length);
            console.log('[GitHub App] JWT preview:', jwt.substring(0, 50) + '...');
            return jwt;
        } catch (e) {
            console.error('[GitHub App] JWT generation failed:', e);
            console.error('[GitHub App] Key starts with:', privateKey.substring(0, 100));
            throw new Error(`Failed to generate JWT: ${e.message}. Make sure the private key is in valid PEM format (PKCS#1 RSA or PKCS#8).`);
        }
    },
    
    async getAppInstallations(jwt) {
        console.log('[GitHub API] Getting app installations');
        const response = await fetch(`${this.baseUrl}/app/installations`, {
            headers: {
                'Accept': 'application/vnd.github+json',
                'Authorization': `Bearer ${jwt}`,
                'X-GitHub-Api-Version': '2022-11-28',
            },
        });
        
        if (!response.ok) {
            const error = await response.json().catch(() => ({}));
            console.error('[GitHub API] Get installations error:', error);
            throw new Error(error.message || `Failed to get installations: ${response.status}`);
        }
        
        const installations = await response.json();
        console.log(`[GitHub API] Found ${installations.length} installation(s)`);
        return installations;
    },
    
    async getInstallationToken(jwt, installationId) {
        console.log(`[GitHub API] Getting installation token for installation ${installationId}`);
        const response = await fetch(`${this.baseUrl}/app/installations/${installationId}/access_tokens`, {
            method: 'POST',
            headers: {
                'Accept': 'application/vnd.github+json',
                'Authorization': `Bearer ${jwt}`,
                'X-GitHub-Api-Version': '2022-11-28',
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({}),
        });
        
        if (!response.ok) {
            const error = await response.json().catch(() => ({}));
            console.error(`[GitHub API] Installation token error:`, error);
            throw new Error(error.message || `Failed to get installation token: ${response.status}`);
        }
        
        return response.json();
    },
    
    async getInstallationForRepo(jwt, owner, repo) {
        // Try to get the installation for this specific repo
        try {
            const response = await fetch(`${this.baseUrl}/repos/${owner}/${repo}/installation`, {
                headers: {
                    'Accept': 'application/vnd.github+json',
                    'Authorization': `Bearer ${jwt}`,
                    'X-GitHub-Api-Version': '2022-11-28',
                },
            });
            
            if (response.ok) {
                return response.json();
            }
        } catch (e) {
            // Fall through to get all installations
        }
        
        // If that fails, get all installations and find a matching one
        const installations = await this.getAppInstallations(jwt);
        if (installations.length === 0) {
            throw new Error('No installations found for this GitHub App');
        }
        
        // Return the first installation (user might need to select if multiple)
        return installations[0];
    },
    
    async authenticateAsApp(appId, privateKey, owner, repo) {
        // Normalize the private key - handle different line endings and formats
        let normalizedKey = privateKey.trim();
        
        // If the key doesn't have proper line breaks, try to fix it
        if (!normalizedKey.includes('\n') && normalizedKey.includes('-----BEGIN')) {
            // Key might be on a single line or have escaped newlines
            normalizedKey = normalizedKey
                .replace(/\\n/g, '\n')
                .replace(/-----BEGIN (RSA |EC )?PRIVATE KEY-----/g, '-----BEGIN $1PRIVATE KEY-----\n')
                .replace(/-----END (RSA |EC )?PRIVATE KEY-----/g, '\n-----END $1PRIVATE KEY-----');
        }
        
        console.log('[GitHub App] Normalized key starts with:', normalizedKey.substring(0, 50));
        
        const jwt = this.generateJWT(appId, normalizedKey);
        console.log('[GitHub App] JWT generated, length:', jwt.length);
        
        const installation = await this.getInstallationForRepo(jwt, owner, repo);
        console.log('[GitHub App] Found installation:', installation.id, 'for account:', installation.account?.login);
        
        const tokenData = await this.getInstallationToken(jwt, installation.id);
        console.log('[GitHub App] Got installation token, expires:', tokenData.expires_at);
        
        return {
            token: tokenData.token,
            expiresAt: tokenData.expires_at,
            installation: installation,
        };
    },
};

function App() {
    const [repoInputs, setRepoInputs] = useState(['']);
    const [token, setToken] = useState(() => localStorage.getItem('gh_token') || '');
    const [showAuthConfig, setShowAuthConfig] = useState(false);
    const [repos, setRepos] = useState([]); // Array of { owner, repo } objects
    const [allPRs, setAllPRs] = useState([]); // All PRs with repo info attached
    const [selectedPRs, setSelectedPRs] = useState(new Set()); // Set of "owner/repo#number" strings
    const [compactView, setCompactView] = useState(false);
    const [loading, setLoading] = useState(false);
    const [error, setError] = useState(null);
    const [toast, setToast] = useState(null);
    const [showModal, setShowModal] = useState(false);
    const [approving, setApproving] = useState(false);
    const [approvalProgress, setApprovalProgress] = useState({ current: 0, total: 0, results: [] });
    const [approvalComment, setApprovalComment] = useState('Approved via PR Approver tool ✅');
    const [removeNeedsReview, setRemoveNeedsReview] = useState(true);
    const [filterNeedsReview, setFilterNeedsReview] = useState(false);
    const [filterMissingApproval, setFilterMissingApproval] = useState(true);
    const [prReviews, setPrReviews] = useState({}); // { prNumber: { approved: boolean, approvers: [] } }
    const [loadingReviews, setLoadingReviews] = useState(false);
    const [user, setUser] = useState(null);
    
    // Auth type: 'pat' or 'github_app'
    const [authType, setAuthType] = useState(() => localStorage.getItem('gh_auth_type') || 'pat');
    const [appId, setAppId] = useState(() => localStorage.getItem('gh_app_id') || '');
    const [privateKey, setPrivateKey] = useState(() => localStorage.getItem('gh_private_key') || '');
    const [appToken, setAppToken] = useState(null);
    const [appTokenLoading, setAppTokenLoading] = useState(false);
    const [appError, setAppError] = useState(null);

    // Show toast notification
    const showToast = useCallback((message, type = 'success') => {
        setToast({ message, type });
        setTimeout(() => setToast(null), 4000);
    }, []);

    // Save settings to localStorage
    useEffect(() => {
        if (token) localStorage.setItem('gh_token', token);
    }, [token]);
    
    useEffect(() => {
        localStorage.setItem('gh_auth_type', authType);
    }, [authType]);
    
    useEffect(() => {
        if (appId) localStorage.setItem('gh_app_id', appId);
    }, [appId]);
    
    useEffect(() => {
        if (privateKey) localStorage.setItem('gh_private_key', privateKey);
    }, [privateKey]);

    // Validate PAT token and get user
    useEffect(() => {
        if (authType === 'pat' && token) {
            GitHubAPI.validateToken(token)
                .then(setUser)
                .catch(() => setUser(null));
        } else if (authType === 'pat') {
            setUser(null);
        }
    }, [token, authType]);
    
    // Get GitHub App installation token when needed
    const getAppToken = async () => {
        if (!appId || !privateKey || repos.length === 0) {
            setAppError('App ID, Private Key, and repository are required');
            return null;
        }
        
        setAppTokenLoading(true);
        setAppError(null);
        
        try {
            // Use the first repo to authenticate (app should have access to all)
            const firstRepo = repos[0];
            console.log('[GitHub App] Starting authentication...');
            console.log('[GitHub App] App ID:', appId);
            console.log('[GitHub App] Private Key length:', privateKey.length);
            console.log('[GitHub App] Repo:', firstRepo.owner + '/' + firstRepo.repo);
            
            const result = await GitHubAPI.authenticateAsApp(appId, privateKey, firstRepo.owner, firstRepo.repo);
            console.log('[GitHub App] Authentication successful!');
            console.log('[GitHub App] Token expires at:', result.expiresAt);
            setAppToken(result);
            return result.token;
        } catch (e) {
            console.error('[GitHub App] Authentication failed:', e);
            setAppError(e.message);
            setAppToken(null);
            return null;
        } finally {
            setAppTokenLoading(false);
        }
    };
    
    // Get token for reading repos (returns null if not configured, which is fine for public repos)
    const getReadToken = () => {
        if (token) return token;
        if (appToken && new Date(appToken.expiresAt) > new Date()) {
            return appToken.token;
        }
        return null;
    };
    
    // Get the current auth token for API calls (for approval - requires valid auth)
    const getAuthToken = async () => {
        if (authType === 'pat') {
            return token;
        } else {
            // Check if we have a valid app token
            if (appToken && new Date(appToken.expiresAt) > new Date()) {
                return appToken.token;
            }
            // Get a new app token
            return await getAppToken();
        }
    };
    
    // Check if auth is configured
    const isAuthConfigured = () => {
        if (authType === 'pat') {
            return !!token.trim();
        } else {
            return !!appId.trim() && !!privateKey.trim();
        }
    };

    // Fetch reviews for all PRs
    const fetchReviews = async (pullRequests) => {
        setLoadingReviews(true);
        const reviews = {};
        
        // Fetch reviews in parallel (batch of 5 to avoid rate limiting)
        const batchSize = 5;
        for (let i = 0; i < pullRequests.length; i += batchSize) {
            const batch = pullRequests.slice(i, i + batchSize);
            const results = await Promise.all(
                batch.map(async (pr) => {
                    try {
                        // Try with auth token, fallback to no token for public repos
                        const readToken = getReadToken();
                        let prReviews;
                        try {
                            prReviews = await GitHubAPI.getPullRequestReviews(pr._repo.owner, pr._repo.repo, pr.number, readToken);
                        } catch (authError) {
                            if (readToken && (authError.message.includes('401') || authError.message.includes('403') || authError.message.includes('Bad credentials'))) {
                                prReviews = await GitHubAPI.getPullRequestReviews(pr._repo.owner, pr._repo.repo, pr.number, null);
                            } else {
                                throw authError;
                            }
                        }
                        // Get the latest review state per user
                        const reviewerStates = {};
                        prReviews.forEach(review => {
                            if (review.state !== 'COMMENTED' && review.state !== 'PENDING') {
                                reviewerStates[review.user.login] = {
                                    state: review.state,
                                    user: review.user,
                                    submitted_at: review.submitted_at
                                };
                            }
                        });
                        
                        const approvers = Object.values(reviewerStates)
                            .filter(r => r.state === 'APPROVED')
                            .map(r => r.user);
                        
                        const hasChangesRequested = Object.values(reviewerStates)
                            .some(r => r.state === 'CHANGES_REQUESTED');
                        
                        return {
                            prKey: pr._key,
                            approved: approvers.length > 0,
                            approvers,
                            hasChangesRequested,
                            reviewCount: Object.keys(reviewerStates).length
                        };
                    } catch (e) {
                        console.error(`Failed to fetch reviews for PR ${pr._key}:`, e);
                        return { prKey: pr._key, approved: false, approvers: [], hasChangesRequested: false, reviewCount: 0 };
                    }
                })
            );
            
            results.forEach(r => {
                reviews[r.prKey] = r;
            });
        }
        
        setPrReviews(reviews);
        setLoadingReviews(false);
        return reviews;
    };

    // Parse repo inputs array
    const parseRepoInputs = () => {
        const parsed = [];
        for (const input of repoInputs) {
            const trimmed = input.trim();
            if (trimmed) {
                const repo = GitHubAPI.parseRepoInput(trimmed);
                if (repo) {
                    parsed.push(repo);
                }
            }
        }
        return parsed;
    };
    
    // Add a new repo input field
    const addRepoInput = () => {
        setRepoInputs([...repoInputs, '']);
    };
    
    // Remove a repo input field
    const removeRepoInput = (index) => {
        if (repoInputs.length > 1) {
            setRepoInputs(repoInputs.filter((_, i) => i !== index));
        } else {
            setRepoInputs(['']);
        }
    };
    
    // Update a repo input field
    const updateRepoInput = (index, value) => {
        const newInputs = [...repoInputs];
        newInputs[index] = value;
        setRepoInputs(newInputs);
    };

    // Fetch PRs from multiple repos
    const fetchPRs = async () => {
        const parsedRepos = parseRepoInputs();
        
        if (parsedRepos.length === 0) {
            setError('Please enter at least one valid repository');
            return;
        }

        setLoading(true);
        setError(null);
        setRepos(parsedRepos);
        setAllPRs([]);
        setSelectedPRs(new Set());
        setPrReviews({});

        try {
            // Fetch PRs from all repos in parallel
            const allPullRequests = [];
            const results = await Promise.all(
                parsedRepos.map(async (repoInfo) => {
                    try {
                        // Try with auth token first
                        const readToken = getReadToken();
                        let prs;
                        try {
                            prs = await GitHubAPI.getPullRequests(repoInfo.owner, repoInfo.repo, 'open', readToken);
                        } catch (authError) {
                            // If auth fails (401/403), retry without token for public repos
                            if (readToken && (authError.message.includes('401') || authError.message.includes('403') || authError.message.includes('Bad credentials'))) {
                                console.warn(`Auth failed for ${repoInfo.owner}/${repoInfo.repo}, retrying without token...`);
                                prs = await GitHubAPI.getPullRequests(repoInfo.owner, repoInfo.repo, 'open', null);
                            } else {
                                throw authError;
                            }
                        }
                        // Attach repo info to each PR
                        return prs.map(pr => ({
                            ...pr,
                            _repo: repoInfo,
                            _key: `${repoInfo.owner}/${repoInfo.repo}#${pr.number}`
                        }));
                    } catch (e) {
                        console.error(`Failed to fetch PRs from ${repoInfo.owner}/${repoInfo.repo}:`, e);
                        showToast(`Failed to load ${repoInfo.owner}/${repoInfo.repo}: ${e.message}`, 'error');
                        return [];
                    }
                })
            );
            
            results.forEach(prs => allPullRequests.push(...prs));
            setAllPRs(allPullRequests);
            
            if (allPullRequests.length === 0) {
                showToast('No open pull requests found', 'success');
            } else {
                showToast(`Found ${allPullRequests.length} PRs from ${parsedRepos.length} repo(s)`, 'success');
                // Fetch reviews for all PRs
                await fetchReviews(allPullRequests);
            }
        } catch (e) {
            setError(e.message);
            setRepos([]);
        } finally {
            setLoading(false);
        }
    };

    // Toggle PR selection
    const togglePR = (prKey) => {
        const newSelected = new Set(selectedPRs);
        if (newSelected.has(prKey)) {
            newSelected.delete(prKey);
        } else {
            newSelected.add(prKey);
        }
        setSelectedPRs(newSelected);
    };

    // Select all / none
    const selectAll = () => {
        const filtered = getFilteredPRs();
        if (selectedPRs.size === filtered.length && filtered.length > 0) {
            setSelectedPRs(new Set());
        } else {
            setSelectedPRs(new Set(filtered.map(pr => pr._key)));
        }
    };

    // Get filtered PRs
    const getFilteredPRs = () => {
        let filtered = allPRs;
        
        if (filterMissingApproval) {
            filtered = filtered.filter(pr => {
                const review = prReviews[pr._key];
                return !review || !review.approved;
            });
        }
        
        if (filterNeedsReview) {
            filtered = filtered.filter(pr => 
                pr.labels.some(l => l.name.toLowerCase() === 'needs-review')
            );
        }
        
        return filtered;
    };
    
    // Count PRs missing approval
    const missingApprovalCount = allPRs.filter(pr => {
        const review = prReviews[pr._key];
        return !review || !review.approved;
    }).length;
    
    // Count PRs with needs-review label
    const needsReviewCount = allPRs.filter(pr => 
        pr.labels.some(l => l.name.toLowerCase() === 'needs-review')
    ).length;

    // Approve selected PRs
    const approveSelected = async () => {
        if (selectedPRs.size === 0) return;
        
        // Get auth token first
        const authToken = await getAuthToken();
        if (!authToken) {
            showToast('Authentication failed. Please check your credentials.', 'error');
            return;
        }

        setApproving(true);
        setApprovalProgress({ current: 0, total: selectedPRs.size, results: [] });

        const prKeys = Array.from(selectedPRs);
        const results = [];

        for (let i = 0; i < prKeys.length; i++) {
            const prKey = prKeys[i];
            const pr = allPRs.find(p => p._key === prKey);
            
            if (!pr) {
                results.push({ prKey, title: 'Unknown', success: false, error: 'PR not found' });
                continue;
            }
            
            try {
                console.log(`[Approve] Approving ${prKey}...`);
                // Get the commit SHA from the PR (required for approval)
                const commitSha = pr?.head?.sha;
                console.log(`[Approve] ${prKey} HEAD SHA: ${commitSha}`);
                
                // Use the comment or empty string if cleared
                const comment = approvalComment.trim();
                
                // Approve the PR
                await GitHubAPI.approvePR(pr._repo.owner, pr._repo.repo, pr.number, authToken, comment, commitSha);
                console.log(`[Approve] ${prKey} approved successfully`);
                
                // Remove needs-review label if requested (don't fail if label doesn't exist)
                let labelRemoved = false;
                if (removeNeedsReview) {
                    try {
                        console.log(`[Approve] Removing needs-review label from ${prKey}...`);
                        await GitHubAPI.removeLabel(pr._repo.owner, pr._repo.repo, pr.number, 'needs-review', authToken);
                        labelRemoved = true;
                        console.log(`[Approve] Label removed from ${prKey}`);
                    } catch (labelError) {
                        // Label removal is optional - don't fail the whole operation
                        console.warn(`[Approve] Could not remove label from ${prKey}:`, labelError.message);
                    }
                }
                
                results.push({ 
                    prKey,
                    prNumber: pr.number,
                    repo: `${pr._repo.owner}/${pr._repo.repo}`,
                    title: pr?.title, 
                    success: true,
                    labelRemoved: removeNeedsReview ? labelRemoved : null
                });
            } catch (e) {
                console.error(`[Approve] Failed to approve ${prKey}:`, e);
                results.push({ 
                    prKey, 
                    prNumber: pr.number,
                    repo: `${pr._repo.owner}/${pr._repo.repo}`,
                    title: pr?.title, 
                    success: false, 
                    error: e.message 
                });
            }

            setApprovalProgress({ current: i + 1, total: prKeys.length, results });
        }

        const successCount = results.filter(r => r.success).length;
        showToast(`Approved ${successCount} of ${results.length} PRs`, successCount === results.length ? 'success' : 'error');
        
        // Refresh PRs from all repos
        if (repos.length > 0) {
            fetchPRs();
        }

        setSelectedPRs(new Set());
        setApproving(false);
        
        // Keep modal visible for 2.5 seconds so user can see results, then auto-close
        setTimeout(() => {
            setShowModal(false);
        }, 2500);
    };

    // Export PR list as Markdown
    const exportAsMarkdown = () => {
        const prsToExport = filteredPRs;
        if (prsToExport.length === 0) {
            showToast('No PRs to export', 'error');
            return;
        }
        
        const now = new Date().toISOString().split('T')[0];
        let md = `# Pull Requests Export\n\n`;
        md += `**Date:** ${now}\n`;
        md += `**Total PRs:** ${prsToExport.length}\n\n`;
        
        // Group by repo if multiple repos
        const byRepo = {};
        prsToExport.forEach(pr => {
            const repoKey = `${pr._repo.owner}/${pr._repo.repo}`;
            if (!byRepo[repoKey]) byRepo[repoKey] = [];
            byRepo[repoKey].push(pr);
        });
        
        Object.entries(byRepo).forEach(([repoName, prs]) => {
            md += `## ${repoName}\n\n`;
            md += `| # | Title | Author | Status | Labels | Created |\n`;
            md += `|---|-------|--------|--------|--------|--------|\n`;
            
            prs.forEach(pr => {
                const review = prReviews[pr._key];
                const status = review 
                    ? (review.approved ? '✅ Approved' : review.hasChangesRequested ? '❌ Changes Requested' : '⏳ Awaiting Review')
                    : '⏳ Awaiting Review';
                const labels = pr.labels.map(l => `\`${l.name}\``).join(', ') || '-';
                const created = new Date(pr.created_at).toLocaleDateString();
                const title = pr.title.replace(/\|/g, '\\|').substring(0, 60) + (pr.title.length > 60 ? '...' : '');
                
                md += `| [#${pr.number}](${pr.html_url}) | ${title} | @${pr.user.login} | ${status} | ${labels} | ${created} |\n`;
            });
            
            md += `\n`;
        });
        
        // Download the file
        const blob = new Blob([md], { type: 'text/markdown' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `pr-export-${now}.md`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        
        showToast(`Exported ${prsToExport.length} PRs to Markdown`, 'success');
    };

    const filteredPRs = getFilteredPRs();

    return (
        <div className="app">
            {/* Header - App Name */}
            <header className="header">
                <div className="logo">
                    <div className="logo-mark">✓</div>
                    <span className="logo-text" style={{ color: 'var(--acc)' }}>PR Approver</span>
                    <span className="logo-sub">Bulk approve GitHub PRs</span>
                </div>

                {(user || appToken) && (
                    <div 
                        style={{ 
                            display: 'flex', 
                            alignItems: 'center', 
                            gap: 8, 
                            padding: '8px 12px',
                            background: 'var(--green-bg)',
                            borderRadius: 8,
                            fontSize: 11,
                            color: 'var(--green)',
                            cursor: 'pointer',
                            transition: 'all 0.2s'
                        }}
                        onClick={() => {
                            if (user) {
                                setToken('');
                                setUser(null);
                                localStorage.removeItem('gh_token');
                                showToast('Signed out', 'success');
                            }
                            if (appToken) {
                                setAppToken(null);
                                setAppId('');
                                setPrivateKey('');
                                localStorage.removeItem('gh_app_id');
                                localStorage.removeItem('gh_private_key');
                                showToast('GitHub App disconnected', 'success');
                            }
                        }}
                        title="Click to sign out"
                    >
                        {user ? (
                            <>✓ Signed in as <strong>{user.login}</strong> <span style={{ opacity: 0.7 }}>(click to sign out)</span></>
                        ) : (
                            <>🤖 GitHub App authenticated <span style={{ opacity: 0.7 }}>(click to disconnect)</span></>
                        )}
                    </div>
                )}
            </header>

            {/* Toolbar - Repository Inputs */}
            <div className="toolbar">
                <div style={{ display: 'flex', gap: 16, alignItems: 'flex-start', flexWrap: 'wrap' }}>
                    <div style={{ flex: 1, minWidth: 300 }}>
                        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 8 }}>
                            <label className="input-label">Repositories</label>
                            <button
                                className="btn"
                                style={{ 
                                    padding: '4px 8px', 
                                    fontSize: 10,
                                    opacity: (token || appToken) ? 1 : 0.7
                                }}
                                onClick={() => setShowAuthConfig(true)}
                                title="Configure authentication for private repos"
                            >
                                🔐 {(token || appToken) ? 'Auth ✓' : 'Private repos'}
                            </button>
                        </div>
                        <div className="repo-inputs-container">
                            {repoInputs.map((input, index) => (
                                <div key={index} style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
                                    <input
                                        type="text"
                                        className="input-field"
                                        style={{ minWidth: 240, flex: 1 }}
                                        placeholder="owner/repo or GitHub URL"
                                        value={input}
                                        onChange={(e) => updateRepoInput(index, e.target.value)}
                                        onKeyDown={(e) => {
                                            if (e.key === 'Enter') {
                                                e.preventDefault();
                                                fetchPRs();
                                            }
                                        }}
                                    />
                                    <button
                                        className="btn"
                                        style={{ padding: '8px 10px', minWidth: 32 }}

                                                    style={{ 
                                                        width: '100%', 
                                                        minWidth: 'unset', 
                                                        minHeight: 120, 
                                                        fontFamily: 'monospace',
                                                        fontSize: 10,
                                                        resize: 'vertical'
                                                    }}
                                                    placeholder="-----BEGIN RSA PRIVATE KEY-----&#10;...&#10;-----END RSA PRIVATE KEY-----"
                                                    value={privateKey}
                                                    onChange={(e) => setPrivateKey(e.target.value)}
                                                />
                                            </div>
                                            <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginTop: 10 }}>
                                                <button 
                                                    className="btn"
                                                    onClick={getAppToken}
                                                    disabled={!appId || !privateKey || repos.length === 0 || appTokenLoading}
                                                    style={{ fontSize: 11 }}
                                                >
                                                    {appTokenLoading ? '⏳ Testing...' : '🔄 Test Connection'}
                                                </button>
                                            </div>
                                            <div style={{ 
                                                fontSize: 10, 
                                                color: 'var(--t3)', 
                                                marginTop: 10,
                                                padding: '10px 12px',
                                                background: 'var(--bg0)',
                                                borderRadius: 6,
                                                lineHeight: 1.6
                                            }}>
                                                <strong style={{ color: 'var(--t1)' }}>Required GitHub App permissions:</strong>
                                                <ul style={{ margin: '6px 0 0 16px', padding: 0 }}>
                                                    <li><code style={{ background: 'var(--bg3)', padding: '1px 4px', borderRadius: 3 }}>Pull requests: Write</code> — to approve PRs</li>
                                                    <li><code style={{ background: 'var(--bg3)', padding: '1px 4px', borderRadius: 3 }}>Issues: Write</code> — to remove labels</li>
                                                </ul>
                                                <div style={{ marginTop: 6 }}>
                                                    <a href="https://docs.github.com/en/apps/creating-github-apps" target="_blank" rel="noopener noreferrer" style={{ color: 'var(--acc)' }}>
                                                        Creating a GitHub App →
                                                    </a>
                                                </div>
                                            </div>
                                            
                                            {appError && (
                                                <div style={{ 
                                                    marginTop: 12, 
                                                    padding: '10px 12px', 
                                                    background: 'var(--red-bg)', 
                                                    border: '1px solid var(--red)',
                                                    borderRadius: 6,
                                                    fontSize: 11,
                                                    color: 'var(--red)',
                                                    wordBreak: 'break-word'
                                                }}>
                                                    ⚠️ {appError}
                                                </div>
                                            )}
                                            
                                            {appToken && (
                                                <div style={{ 
                                                    marginTop: 12, 
                                                    padding: '10px 12px', 
                                                    background: 'var(--green-bg)', 
                                                    border: '1px solid var(--green)',
                                                    borderRadius: 6,
                                                    fontSize: 11,
                                                    color: 'var(--green)'
                                                }}>
                                                    ✓ Authenticated as GitHub App (expires {new Date(appToken.expiresAt).toLocaleTimeString()})
                                                </div>
                                            )}
                                        </div>
                                    )}

                                    <div style={{ marginTop: 16 }}>
                                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 6 }}>
                                            <label className="input-label">Approval Comment (optional)</label>
                                            {approvalComment && (
                                                <button 
                                                    className="btn" 
                                                    style={{ fontSize: 10, padding: '4px 8px' }}
                                                    onClick={() => setApprovalComment('')}
                                                >
                                                    Clear
                                                </button>
                                            )}
                                        </div>
                                        <textarea
                                            className="comment-input"
                                            style={{ marginTop: 0 }}
                                            placeholder="Leave empty for no comment..."
                                            value={approvalComment}
                                            onChange={(e) => setApprovalComment(e.target.value)}
                                        />
                                        <div style={{ fontSize: 10, color: 'var(--t3)', marginTop: 4 }}>
                                            This comment will be added to all approved PRs. Clear to approve without a comment.
                                        </div>
                                    </div>

                                    <label className="checkbox-group">
                                        <input
                                            type="checkbox"
                                            checked={removeNeedsReview}
                                            onChange={(e) => setRemoveNeedsReview(e.target.checked)}
                                        />
                                        Remove <code style={{ background: 'var(--orange-bg)', padding: '2px 6px', borderRadius: 4, color: 'var(--orange)' }}>needs-review</code> label after approval
                                    </label>
                                </>
                            )}
                        </div>
                        <div className="modal-footer">
                            {!approving && approvalProgress.results.length === 0 && (
                                <>
                                    <button className="btn" onClick={() => setShowModal(false)}>
                                        Cancel
                                    </button>
                                    <button 
                                        className="btn primary" 
                                        onClick={approveSelected}
                                        disabled={!isAuthConfigured() || appTokenLoading}
                                        title={!isAuthConfigured() ? 'Enter authentication credentials to approve' : ''}
                                    >
                                        {appTokenLoading ? '⏳ Authenticating...' : `✅ Approve ${selectedPRs.size} PRs`}
                                    </button>
                                </>
                            )}
                            {!approving && approvalProgress.results.length > 0 && (
                                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', width: '100%' }}>
                                    <span style={{ fontSize: 11, color: 'var(--t3)' }}>
                                        Closing automatically...
                                    </span>
                                    <button className="btn primary" onClick={() => setShowModal(false)}>
                                        Close Now
                                    </button>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            )}

            {/* Toast */}
            {toast && (
                <div className={`toast ${toast.type}`}>
                    {toast.type === 'success' ? '✅' : '❌'} {toast.message}
                </div>
            )}
        </div>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
