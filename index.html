                            <span className="modal-title">🔐 Authentication for Private Repos</span>
                            <button className="modal-close" onClick={() => setShowAuthConfig(false)}>×</button>
                        </div>
                        <div className="modal-body">
                            <p style={{ fontSize: 12, color: 'var(--t2)', marginBottom: 16 }}>
                                Configure authentication to access private repositories. This is also used for approving PRs.
                            </p>
                            
                            {/* Auth Type Selector */}
                            <div style={{ marginBottom: 16 }}>
                                <label className="input-label" style={{ marginBottom: 8, display: 'block' }}>
                                    Authentication Method
                                </label>
                                <div style={{ display: 'flex', gap: 8 }}>
                                    <button
                                        className={`filter-btn ${authType === 'pat' ? 'active' : ''}`}
                                        onClick={() => setAuthType('pat')}
                                        style={{ flex: 1, justifyContent: 'center' }}
                                    >
                                        🔑 PAT
                                    </button>
                                    <button
                                        className={`filter-btn ${authType === 'github_app' ? 'active' : ''}`}
                                        onClick={() => setAuthType('github_app')}
                                        style={{ flex: 1, justifyContent: 'center' }}
                                    >
                                        🤖 GitHub App
                                    </button>
                                </div>
                            </div>

                            {/* PAT Input */}
                            {authType === 'pat' && (
                                <div>
                                    <label className="input-label" style={{ marginBottom: 6, display: 'block' }}>
                                        Personal Access Token
                                        {user && <span style={{ color: 'var(--green)', marginLeft: 8 }}>✓ {user.login}</span>}
                                    </label>
                                    <input
                                        type="password"
                                        className="input-field"
                                        style={{ width: '100%', minWidth: 'unset' }}
                                        placeholder="ghp_xxxxxxxxxxxx"
                                        value={token}
                                        onChange={(e) => setToken(e.target.value)}
                                    />
                                    <div style={{ fontSize: 10, color: 'var(--t3)', marginTop: 6 }}>
                                        Requires <code style={{ background: 'var(--bg3)', padding: '1px 4px', borderRadius: 3 }}>repo</code> scope.{' '}
                                        <a href="https://github.com/settings/tokens/new?scopes=repo" target="_blank" rel="noopener noreferrer" style={{ color: 'var(--acc)' }}>
                                            Create token →
                                        </a>
                                    </div>
                                </div>
                            )}

                            {/* GitHub App Input */}
                            {authType === 'github_app' && (
                                <div>
                                    <div style={{ marginBottom: 12 }}>
                                        <label className="input-label" style={{ marginBottom: 6, display: 'block' }}>
                                            App ID
                                            {appToken && <span style={{ color: 'var(--green)', marginLeft: 8 }}>✓ Connected</span>}
                                        </label>
                                        <input
                                            type="text"
                                            className="input-field"
                                            style={{ width: '100%', minWidth: 'unset' }}
                                            placeholder="123456"
                                            value={appId}
                                            onChange={(e) => setAppId(e.target.value)}
                                        />
                                    </div>
                                    <div>
                                        <label className="input-label" style={{ marginBottom: 6, display: 'block' }}>
                                            Private Key (PEM)
                                        </label>
                                        <textarea
                                            className="input-field"
                                            style={{ 
                                                width: '100%', 
                                                minWidth: 'unset', 
                                                minHeight: 100, 
                                                fontFamily: 'monospace',
                                                fontSize: 10,
                                                resize: 'vertical'
                                            }}
                                            placeholder="-----BEGIN RSA PRIVATE KEY-----&#10;...&#10;-----END RSA PRIVATE KEY-----"
                                            value={privateKey}
                                            onChange={(e) => setPrivateKey(e.target.value)}
                                        />
                                    </div>
                                    <div style={{ fontSize: 10, color: 'var(--t3)', marginTop: 6 }}>
                                        App must be installed on the repository.{' '}
                                        <a href="https://docs.github.com/en/apps/creating-github-apps" target="_blank" rel="noopener noreferrer" style={{ color: 'var(--acc)' }}>
                                            Learn more →
                                        </a>
                                    </div>
                                </div>
                            )}

                                <div style={{ 
                                    marginTop: 12, 
                                    padding: '10px 12px', 
                                    background: 'var(--red-bg)', 
                                    border: '1px solid var(--red)',
                                    borderRadius: 6,
                                    fontSize: 11,
                                    color: 'var(--red)'
                                }}>
                                    ⚠️ {appError}
                                </div>
                            )}
                        </div>
                        <div className="modal-footer">
                            {(token || (appId && privateKey)) && (
                                <button 
                                    className="btn" 
                                    style={{ color: 'var(--red)' }}
                                    onClick={() => {
                                        setToken('');
                                        setUser(null);
                                        setAppId('');
                                        setPrivateKey('');
                                        setAppToken(null);
                                        localStorage.removeItem('gh_token');
                                        localStorage.removeItem('gh_app_id');
                                        localStorage.removeItem('gh_private_key');
                                        showToast('Credentials cleared', 'success');
                                    }}
                                >
                                    Clear All
                                </button>
                            )}
                            <button className="btn primary" onClick={() => setShowAuthConfig(false)}>
                                Done
                            </button>
                        </div>
                    </div>
                </div>
            )}

            {/* Approval Modal */}
            {showModal && (
                <div className="modal-overlay" onClick={() => !approving && setShowModal(false)}>
                    <div className="modal" onClick={(e) => e.stopPropagation()}>
                        <div className="modal-header">
                            <span className="modal-title">✅ Approve Pull Requests</span>
                            {!approving && (
                                <button className="modal-close" onClick={() => setShowModal(false)}>×</button>
                            )}
                        </div>

                                <div className="approval-count">{selectedPRs.size}</div>
                                <div className="approval-text">pull requests will be approved</div>

                            {(approving || approvalProgress.results.length > 0) && (
                                <>
                                    <div className="progress-bar">
                                        <div 
                                            className="progress-fill"
                                            style={{ width: `${(approvalProgress.current / approvalProgress.total) * 100}%` }}

                                    <div style={{ fontSize: 12, color: 'var(--t2)', marginTop: 8, textAlign: 'center' }}>

                                            ? `Processing ${approvalProgress.current} of ${approvalProgress.total}...`
                                            : `Completed: ${approvalProgress.results.filter(r => r.success).length} of ${approvalProgress.results.length} approved`
                                        }

                                    <div className="approval-list" style={{ marginTop: 16 }}>

                                            <div key={i} className="approval-item" style={{ 
                                                flexDirection: 'column', 
                                                alignItems: 'flex-start',
                                                background: r.success ? 'var(--green-bg)' : 'var(--red-bg)'
                                            }}>
                                                <div style={{ display: 'flex', alignItems: 'center', gap: 10, width: '100%' }}>
                                                    <span className="approval-item-status">
                                                        {r.success ? '✅' : '❌'}
                                                    </span>
                                                    <span className="approval-item-name" style={{ display: 'flex', flexDirection: 'column', gap: 2 }}>
                                                        <span>
                                                            {repos.length > 1 && r.repo && (
                                                                <span style={{ fontSize: 9, color: 'var(--t3)', marginRight: 6 }}>
                                                                    {r.repo}
                                                                </span>
                                                            )}
                                                            #{r.prNumber}
                                                        </span>
                                                        <span style={{ fontSize: 11, color: r.success ? 'var(--green)' : 'var(--red)' }}>
                                                            {r.title}
                                                        </span>
                                                    </span>
                                                </div>
                                                {r.success && r.labelRemoved === false && (
                                                    <div style={{ 
                                                        fontSize: 10, 
                                                        color: 'var(--orange)', 
                                                        marginTop: 6,
                                                        marginLeft: 24
                                                    }}>
                                                        ⚠️ Label not removed (didn't exist)
                                                    </div>
                                                )}
                                                {r.error && (
                                                    <div style={{ 
                                                        fontSize: 10, 
                                                        color: 'var(--red)', 
                                                        marginTop: 6,
                                                        marginLeft: 24,
                                                        wordBreak: 'break-word'
                                                    }}>
                                                        Error: {r.error}
                                                    </div>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                </>
                            )}

                            {/* Show pending PRs list before approval starts */}
                            {!approving && approvalProgress.results.length === 0 && (
                                <>
                                    <div className="approval-list">
                                        {Array.from(selectedPRs).map(prKey => {
                                            const pr = allPRs.find(p => p._key === prKey);
                                            return (
                                                <div key={prKey} className="approval-item">
                                                    <span className="approval-item-status">📋</span>
                                                    <span className="approval-item-name" style={{ display: 'flex', flexDirection: 'column', gap: 2 }}>
                                                        <span>
                                                            {repos.length > 1 && (
                                                                <span style={{ fontSize: 9, color: 'var(--t3)', marginRight: 6 }}>
                                                                    {pr?._repo?.owner}/{pr?._repo?.repo}
                                                                </span>
                                                            )}
                                                            #{pr?.number}
                                                        </span>
                                                        <span style={{ fontSize: 11, color: 'var(--t1)' }}>{pr?.title}</span>
                                                    </span>
                                                </div>
                                            );
                                        })}
                                    </div>

                                    {/* Auth Type Selector */}
                                    <div style={{ marginTop: 20 }}>
                                        <label className="input-label" style={{ marginBottom: 8, display: 'block' }}>
                                            🔐 Authentication Method
                                        </label>
                                        <div style={{ display: 'flex', gap: 8 }}>
                                            <button
                                                className={`filter-btn ${authType === 'pat' ? 'active' : ''}`}
                                                onClick={() => setAuthType('pat')}
                                                style={{ flex: 1, justifyContent: 'center' }}
                                            >
                                                🔑 Personal Access Token
                                            </button>
                                            <button
                                                className={`filter-btn ${authType === 'github_app' ? 'active' : ''}`}
                                                onClick={() => setAuthType('github_app')}
                                                style={{ flex: 1, justifyContent: 'center' }}
                                            >
                                                🤖 GitHub App
                                            </button>
                                        </div>
                                    </div>

                                    {/* PAT Input */}
                                    {authType === 'pat' && (
                                        <div style={{ marginTop: 16 }}>
                                            <label className="input-label" style={{ marginBottom: 6, display: 'block' }}>
                                                Personal Access Token
                                                {user && <span style={{ color: 'var(--green)', marginLeft: 8 }}>✓ {user.login}</span>}
                                            </label>
                                            <input
                                                type="password"

                                        value={`${labelManagerRepo.owner}/${labelManagerRepo.repo}`}

                                            draft: 'This PR is in draft state. Mark it ready for review to merge.',
                                            unstable: 'Some non-required checks are failing, but the merge is allowed.',

                                                    padding: '10px 12px',

                                                                    flex: 1,
                                                                    justifyContent: 'center',

                                <div style={{
                                    padding: '10px 12px',
                                    background: 'var(--red-bg)',
                                    border: '1px solid var(--red)',

                                <div style={{
                                    padding: '14px 16px',
                                    background: 'var(--green-bg)',
                                    border: '1px solid var(--green)',
                                    borderRadius: 6,
                                    fontSize: 13,
                                    color: 'var(--green)',
                                    textAlign: 'center',

                                    marginTop: 12,

                                    border: '1px solid var(--red)',

                                    fontSize: 11,
                                    color: 'var(--red)',

                                    ⚠️ {mergeError}

                                        Cancel

                                        className="btn primary"

                                            !mergeDetails ||
                                            mergeDetails.mergeable !== true ||
                                            !isAuthConfigured()
                                        }
                                        title={
                                            !isAuthConfigured() ? 'Configure authentication first' :
                                            !mergeDetails ? 'Loading…' :
                                            mergeDetails.mergeable !== true ? 'PR is not currently mergeable' : ''
                                        }
                                    >
                                        {mergeBusy ? '⏳ Merging…' : `⤴️ Merge (${mergeStrategy})`}
                                    </button>
                                </>
                            )}
                        </div>
                    </div>
                </div>
            )}

            {/* Bulk Merge Modal */}
            {showBulkMerge && (
                <div className="modal-overlay" onClick={closeBulkMerge}>
                    <div className="modal" onClick={(e) => e.stopPropagation()}>
                        <div className="modal-header">
                            <span className="modal-title">⤴️ Merge Pull Requests</span>
                            {!bulkMergeRunning && (
                                <button className="modal-close" onClick={closeBulkMerge}>×</button>
                            )}
                        </div>
                        <div className="modal-body">
                            <div className="approval-summary">
                                <div className="approval-count" style={{ color: 'var(--acc)' }}>{selectedPRs.size}</div>
                                <div className="approval-text">pull requests will be merged</div>
                            </div>

                            {/* Progress / results once the run starts */}
                            {(bulkMergeRunning || bulkMergeProgress.results.length > 0) && (
                                <>
                                    <div className="progress-bar">
                                        <div
                                            className="progress-fill"
                                            style={{
                                                width: `${bulkMergeProgress.total === 0 ? 0 : (bulkMergeProgress.current / bulkMergeProgress.total) * 100}%`,
                                                background: 'var(--acc)',
                                            }}
                                        />
                                    </div>
                                    <div style={{ fontSize: 12, color: 'var(--t2)', marginTop: 8, textAlign: 'center' }}>
                                        {bulkMergeRunning
                                            ? `Processing ${bulkMergeProgress.current} of ${bulkMergeProgress.total}…`
                                            : `Completed: ${bulkMergeProgress.results.filter(r => r.success).length} of ${bulkMergeProgress.results.length} merged`
                                        }
                                    </div>
                                    <div className="approval-list" style={{ marginTop: 16 }}>
                                        {bulkMergeProgress.results.map((r, i) => (
                                            <div key={i} className="approval-item" style={{
                                                flexDirection: 'column',
                                                alignItems: 'flex-start',
                                                background: r.success ? 'var(--green-bg)' : (r.skipped ? 'var(--orange-bg)' : 'var(--red-bg)'),
                                            }}>
                                                <div style={{ display: 'flex', alignItems: 'center', gap: 10, width: '100%' }}>
                                                    <span className="approval-item-status">
                                                        {r.success ? '✅' : (r.skipped ? '⏭️' : '❌')}
                                                    </span>
                                                    <span className="approval-item-name" style={{ display: 'flex', flexDirection: 'column', gap: 2 }}>
                                                        <span>
                                                            {repos.length > 1 && r.repo && (
                                                                <span style={{ fontSize: 9, color: 'var(--t3)', marginRight: 6 }}>
                                                                    {r.repo}
                                                                </span>
                                                            )}
                                                            #{r.prNumber}
                                                            {r.success && r.sha && (
                                                                <span style={{ fontSize: 10, color: 'var(--green)', marginLeft: 8 }}>
                                                                    {r.sha.slice(0, 7)}
                                                                </span>
                                                            )}
                                                        </span>
                                                        <span style={{ fontSize: 11, color: r.success ? 'var(--green)' : (r.skipped ? 'var(--orange)' : 'var(--red)') }}>
                                                            {r.title}
                                                        </span>
                                                    </span>
                                                </div>
                                                {r.error && (
                                                    <div style={{
                                                        fontSize: 10,
                                                        color: r.skipped ? 'var(--orange)' : 'var(--red)',
                                                        marginTop: 6,
                                                        marginLeft: 24,
                                                        wordBreak: 'break-word',
                                                    }}>
                                                        {r.error}
                                                    </div>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                </>
                            )}

                            {/* Pre-run UI */}
                            {!bulkMergeRunning && bulkMergeProgress.results.length === 0 && (
                                <>
                                    <div className="approval-list">
                                        {Array.from(selectedPRs).map(prKey => {
                                            const pr = allPRs.find(p => p._key === prKey);
                                            return (
                                                <div key={prKey} className="approval-item">
                                                    <span className="approval-item-status">📋</span>
                                                    <span className="approval-item-name" style={{ display: 'flex', flexDirection: 'column', gap: 2 }}>
                                                        <span>
                                                            {repos.length > 1 && (
                                                                <span style={{ fontSize: 9, color: 'var(--t3)', marginRight: 6 }}>
                                                                    {pr?._repo?.owner}/{pr?._repo?.repo}
                                                                </span>
                                                            )}
                                                            #{pr?.number}
                                                        </span>
                                                        <span style={{ fontSize: 11, color: 'var(--t1)' }}>{pr?.title}</span>
                                                    </span>
                                                </div>
                                            );
                                        })}
                                    </div>

                                    {/* Strategy picker — restricted to strategies allowed by every involved repo */}
                                    <div style={{ marginTop: 20 }}>
                                        <label className="input-label" style={{ marginBottom: 8, display: 'block' }}>
                                            Merge strategy
                                        </label>
                                        <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
                                            {['merge', 'squash', 'rebase'].map(s => {
                                                const enabled = bulkMergeAllowed.includes(s);
                                                return (
                                                    <button
                                                        key={s}
                                                        className={`filter-btn ${bulkMergeStrategy === s ? 'active' : ''}`}
                                                        onClick={() => enabled && setBulkMergeStrategy(s)}
                                                        disabled={!enabled}
                                                        style={{
                                                            flex: 1,
                                                            justifyContent: 'center',
                                                            opacity: enabled ? 1 : 0.4,
                                                            cursor: enabled ? 'pointer' : 'not-allowed',
                                                        }}
                                                        title={enabled ? '' : 'Not allowed by at least one of the selected repositories'}
                                                    >
                                                        {s === 'merge' && '🔀 Create merge commit'}
                                                        {s === 'squash' && '🟪 Squash and merge'}
                                                        {s === 'rebase' && '🔁 Rebase and merge'}
                                                    </button>
                                                );
                                            })}
                                        </div>
                                        <div style={{ fontSize: 10, color: 'var(--t3)', marginTop: 8, lineHeight: 1.5 }}>
                                            Each PR will be re-checked for mergeability before merging — PRs that aren't mergeable (conflicts, failing required checks, draft, behind base) will be skipped, not failed.
                                        </div>
                                    </div>
                                </>
                            )}
                        </div>
                        <div className="modal-footer">
                            {!bulkMergeRunning && bulkMergeProgress.results.length === 0 && (
                                <>
                                    <button className="btn" onClick={closeBulkMerge}>
                                        Cancel
                                    </button>
                                    <button
                                        className="btn primary"
                                        onClick={runBulkMerge}
                                        disabled={!isAuthConfigured() || appTokenLoading || selectedPRs.size === 0}
                                        title={!isAuthConfigured() ? 'Configure authentication first' : ''}
                                    >
                                        {appTokenLoading ? '⏳ Authenticating…' : `⤴️ Merge ${selectedPRs.size} PRs (${bulkMergeStrategy})`}
                                    </button>
                                </>
                            )}
                            {!bulkMergeRunning && bulkMergeProgress.results.length > 0 && (
                                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', width: '100%' }}>
                                    <span style={{ fontSize: 11, color: 'var(--t3)' }}>
                                        Closing automatically…
                                    </span>
                                    <button className="btn primary" onClick={closeBulkMerge}>
                                        Close Now
                                    </button>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            )}

            {/* Toast */}
            {toast && (
                <div className={`toast ${toast.type}`}>
                    {toast.type === 'success' ? '✅' : '❌'} {toast.message}
                </div>
            )}
        </div>
    );
}

// Helper component used by the Label Manager modal — kept here to match
// the project's "everything in one file" convention.
function LabelEditorRow({ draft, setDraft, onSave, onCancel, busy, isNew }) {
    return (
        <div style={{
            display: 'flex',
            flexDirection: 'column',
            gap: 6,
            padding: 10,
            background: 'var(--bg0)',
            border: '1px solid var(--acc)',
            borderRadius: 6,
        }}>
            <div style={{ display: 'flex', gap: 6 }}>
                <input
                    type="text"
                    className="input-field"
                    style={{ flex: 2, minWidth: 'unset' }}
                    placeholder="label-name"
                    value={draft.name}
                    onChange={(e) => setDraft({ ...draft, name: e.target.value })}
                    disabled={busy}
                />
                <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                    <input
                        type="color"
                        value={`#${(draft.color || 'cccccc').replace(/^#/, '')}`}
                        onChange={(e) => setDraft({ ...draft, color: e.target.value.replace(/^#/, '') })}
                        disabled={busy}
                        style={{ width: 32, height: 32, padding: 0, border: 'none', background: 'transparent', cursor: 'pointer' }}
                    />
                    <input
                        type="text"
                        className="input-field"
                        style={{ width: 90, minWidth: 'unset', fontFamily: 'monospace', fontSize: 11 }}
                        placeholder="ff7b72"
                        value={draft.color || ''}
                        onChange={(e) => setDraft({ ...draft, color: e.target.value.replace(/^#/, '') })}
                        disabled={busy}
                    />
                </div>
            </div>
            <input
                type="text"
                className="input-field"
                style={{ width: '100%', minWidth: 'unset' }}
                placeholder="Description (optional)"
                value={draft.description || ''}
                onChange={(e) => setDraft({ ...draft, description: e.target.value })}
                disabled={busy}
            />
            <div style={{ display: 'flex', gap: 6, justifyContent: 'flex-end' }}>
                <button className="btn" onClick={onCancel} disabled={busy} style={{ fontSize: 11 }}>
                    Cancel
                </button>
                <button className="btn primary" onClick={onSave} disabled={busy || !draft.name.trim()} style={{ fontSize: 11 }}>
                    {busy ? '⏳' : (isNew ? 'Create' : 'Save')}
                </button>
            </div>
        </div>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
