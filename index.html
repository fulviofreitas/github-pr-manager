<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PR Manager — Approve, Label, and Merge GitHub Pull Requests</title>
    <meta name="description" content="Approve, label, and merge GitHub PRs from one screen. No installation required.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✅</text></svg>">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsrsasign/11.1.0/jsrsasign-all-min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
:root {
    /* Warm midnight theme with coral accents */
    --bg0: #1a1625;
    --bg1: #231e2e;
    --bg2: #2d2640;
    --bg3: #3d3554;
    --bg4: #524a6a;
    --hover: #352f45;
    --border: #3d3554;
    --border2: #2d2640;
    --t0: #f5f0fa;
    --t1: #d4cce0;
    --t2: #9f94b3;
    --t3: #716886;
    --acc: #ff7b72;
    --acc2: #ff5c4d;
    --accbg: rgba(255, 123, 114, 0.12);
    --green: #7ee787;
    --green-bg: rgba(126, 231, 135, 0.15);
    --red: #ff6b6b;
    --red-bg: rgba(255, 107, 107, 0.15);
    --orange: #ffa657;
    --orange-bg: rgba(255, 166, 87, 0.15);
    --purple: #d2a8ff;
    --purple-bg: rgba(210, 168, 255, 0.15);
    --cyan: #79c0ff;
    --pink: #ff9ec3;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'IBM Plex Mono', monospace;
    background: var(--bg0);
    color: var(--t0);
    min-height: 100vh;
}

.app {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

/* Header */
.header {
    background: var(--bg1);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
}

.toolbar {
    background: transparent;
    padding: 24px;
    max-width: 1400px;
    margin: 0 auto;
    width: 100%;
}

.repo-inputs-container {
    display: flex;
    flex-direction: column;
    gap: 6px;
}

.logo {
    display: flex;
    align-items: center;
    gap: 12px;
}

.logo-mark {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, var(--acc), var(--purple));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
}

.logo-text {
    font-size: 18px;
    font-weight: 700;
    color: var(--acc);
}

.logo-sub {
    font-size: 11px;
    color: var(--t3);
    margin-left: 8px;
}

/* Input Group */
.input-section {
    display: flex;
    gap: 12px;
    flex: 1;
    flex-wrap: wrap;
    align-items: center;
}

.input-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
}

.input-label {
    font-size: 10px;
    color: var(--t3);
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.input-field {
    padding: 10px 14px;
    background: var(--bg0);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--t0);
    font-family: inherit;
    font-size: 12px;
    min-width: 280px;
    transition: border-color 0.2s, box-shadow 0.2s;
}

.input-field:focus {
    outline: none;
    border-color: var(--acc);
    box-shadow: 0 0 0 3px var(--accbg);
}

.input-field.small {
    min-width: 200px;
}

.input-field::placeholder {
    color: var(--t3);
}

.btn {
    padding: 10px 20px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--t1);
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.2s;
    white-space: nowrap;
}

.btn:hover:not(:disabled) {
    background: var(--bg4);
    border-color: var(--acc);
    color: var(--acc);
}

.btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

.btn.primary {
    background: var(--acc);
    color: var(--bg0);
    border-color: var(--acc);
    font-weight: 600;
}

.btn.primary:hover:not(:disabled) {
    background: var(--acc2);
    border-color: var(--acc2);
    color: var(--bg0);
}

.btn.danger {
    background: var(--red-bg);
    color: var(--red);
    border-color: var(--red);
}

.btn.danger:hover:not(:disabled) {
    background: var(--red);
    color: white;
}

/* Main Content */
.main {
    flex: 1;
    padding: 24px;
    max-width: 1400px;
    margin: 0 auto;
    width: 100%;
}

/* Welcome Screen */
.welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 24px;
    text-align: center;
}

.welcome-icon {
    font-size: 64px;
    margin-bottom: 24px;
}

.welcome-title {
    font-size: 28px;
    font-weight: 700;
    color: var(--t0);
    margin-bottom: 12px;
}

.welcome-desc {
    font-size: 14px;
    color: var(--t2);
    max-width: 500px;
    line-height: 1.6;
}

.welcome-steps {
    display: flex;
    gap: 24px;
    margin-top: 48px;
    flex-wrap: wrap;
    justify-content: center;
}

.welcome-step {
    background: var(--bg1);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    width: 200px;
    text-align: center;
}

.step-num {
    width: 32px;
    height: 32px;
    background: var(--accbg);
    border: 1px solid var(--acc);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    color: var(--acc);
    margin: 0 auto 12px;
}

.step-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--t0);
    margin-bottom: 8px;
}

.step-desc {
    font-size: 11px;
    color: var(--t3);
    line-height: 1.5;
}

/* Loading */
.loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 24px;
}

.spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--acc);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

.loading-text {
    margin-top: 16px;
    font-size: 13px;
    color: var(--t2);
}

/* Error */
.error-box {
    background: var(--red-bg);
    border: 1px solid var(--red);
    border-radius: 12px;
    padding: 20px 24px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 24px;
}

.error-icon {
    font-size: 20px;
}

.error-content {
    flex: 1;
}

.error-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--red);
    margin-bottom: 4px;
}

.error-msg {
    font-size: 12px;
    color: var(--t2);
}

/* Stats Bar */
.stats-bar {
    display: flex;
    gap: 16px;
    margin-bottom: 24px;
    flex-wrap: wrap;
}

.stat-card {
    background: var(--bg1);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    min-width: 140px;
}

.stat-value {
    font-size: 28px;
    font-weight: 700;
    color: var(--purple);
}

.stat-label {
    font-size: 10px;
    color: var(--t3);
    text-transform: uppercase;
    margin-top: 4px;
}

.stat-card.needs-review .stat-value {
    color: var(--orange);
}

.stat-card.success .stat-value {
    color: var(--green);
}

/* PR List */
.pr-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 12px;
}

.pr-title {
    font-size: 18px;
    font-weight: 600;
    color: var(--t0);
    display: flex;
    align-items: center;
    gap: 10px;
}

.pr-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-left: auto;
    justify-content: flex-end;
}

.filter-btn {
    padding: 8px 14px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--t2);
    font-family: inherit;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
}

.filter-btn:hover, .filter-btn.active {
    background: var(--accbg);
    border-color: var(--acc);
    color: var(--acc);
}

.auth-toggle {
    display: flex;
    gap: 0;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--border);
}

.auth-toggle .filter-btn {
    border-radius: 0;
    border: none;
    border-right: 1px solid var(--border);
}

.auth-toggle .filter-btn:last-child {
    border-right: none;
}

.pr-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.pr-card {
    background: var(--bg1);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    transition: all 0.2s;
    cursor: pointer;
}

.pr-card:hover {
    border-color: var(--acc);
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
}

.pr-card.selected {
    border-color: var(--green);
    background: var(--green-bg);
}

.pr-card-header {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    margin-bottom: 12px;
}

.pr-checkbox {
    width: 20px;
    height: 20px;
    appearance: none;
    background: var(--bg0);
    border: 2px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    position: relative;
    flex-shrink: 0;
    margin-top: 2px;
}

.pr-checkbox:checked {
    background: var(--green);
    border-color: var(--green);
}

.pr-checkbox:checked::after {
    content: '✓';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: var(--bg0);
    font-size: 12px;
    font-weight: 700;
}

.pr-info {
    flex: 1;
    min-width: 0;
}

.pr-number {
    font-size: 13px;
    font-weight: 600;
    color: var(--cyan);
}

.pr-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--t0);
    margin-top: 4px;
    line-height: 1.4;
    word-break: break-word;
}

.pr-meta {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-top: 10px;
    flex-wrap: wrap;
    font-size: 11px;
    color: var(--t3);
}

.pr-author {
    display: flex;
    align-items: center;
    gap: 6px;
}

.pr-author-avatar {
    width: 20px;
    height: 20px;
    border-radius: 50%;
}

.pr-labels {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 12px;
}

.label {
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 600;
    border: 1px solid transparent;
}

.label.needs-review {
    background: var(--orange-bg);
    color: var(--orange);
    border-color: var(--orange);
}

.pr-status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--t2);
    margin-left: auto;
}

.status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
}

.status-dot.pending {
    background: var(--orange);
}

/* Approval Modal */
.modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 24px;
}

.modal {
    background: var(--bg1);
    border: 1px solid var(--border);
    border-radius: 16px;
    max-width: 500px;
    width: 100%;
    max-height: 80vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
}

.modal-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.modal-title {
    font-size: 16px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 10px;
}

.modal-close {
    background: none;
    border: none;
    color: var(--t3);
    font-size: 20px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 4px;
}

.modal-close:hover {
    background: var(--bg3);
    color: var(--t0);
}

.modal-body {
    padding: 24px;
    overflow-y: auto;
}

.modal-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 12px;
    justify-content: flex-end;
}

.approval-summary {
    background: var(--bg0);
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 20px;
}

.approval-count {
    font-size: 24px;
    font-weight: 700;
    color: var(--green);
}

.approval-text {
    font-size: 12px;
    color: var(--t2);
    margin-top: 4px;
}

.approval-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 200px;
    overflow-y: auto;
}

.approval-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: var(--bg2);
    border-radius: 6px;
    font-size: 12px;
}

.approval-item-status {
    font-size: 14px;
}

.approval-item-name {
    flex: 1;
    color: var(--t1);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.comment-input {
    width: 100%;
    padding: 12px;
    background: var(--bg0);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--t0);
    font-family: inherit;
    font-size: 12px;
    resize: vertical;
    min-height: 80px;
    margin-top: 16px;
}

.comment-input:focus {
    outline: none;
    border-color: var(--acc);
}

.checkbox-group {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 16px;
    font-size: 12px;
    color: var(--t1);
}

.checkbox-group input {
    width: 16px;
    height: 16px;
    accent-color: var(--green);
}

/* Toast */
.toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    padding: 14px 20px;
    background: var(--bg1);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 13px;
    color: var(--t0);
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    z-index: 2000;
    animation: slideIn 0.3s ease;
}

.toast.success {
    border-color: var(--green);
}

.toast.error {
    border-color: var(--red);
}

@keyframes slideIn {
    from {
        transform: translateX(100%);
        opacity: 0;
    }
    to {
        transform: translateX(0);
        opacity: 1;
    }
}

/* Empty State */
.empty-state {
    text-align: center;
    padding: 60px 24px;
    color: var(--t3);
}

.empty-icon {
    font-size: 48px;
    margin-bottom: 16px;
}

.empty-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--t2);
    margin-bottom: 8px;
}

.empty-desc {
    font-size: 12px;
}

/* Progress */
.progress-bar {
    height: 4px;
    background: var(--bg3);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 16px;
}

.progress-fill {
    height: 100%;
    background: var(--green);
    transition: width 0.3s;
}

/* Responsive */
@media (max-width: 768px) {
    .header {
        padding: 12px 16px;
    }
    
    .input-field {
        min-width: 100%;
    }
    
    .input-field.small {
        min-width: 100%;
    }
    
    .main {
        padding: 16px;
    }
    
    .welcome-steps {
        flex-direction: column;
        align-items: center;
    }
    
    .stats-bar {
        flex-direction: column;
    }
    
    .stat-card {
        width: 100%;
    }
}
    </style>

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

// Parses a Link header (RFC 5988) and returns the URL for the requested rel.
function parseLinkHeader(header, rel) {
    if (!header) return null;
    const parts = header.split(',');
    for (const part of parts) {
        const m = part.match(/<([^>]+)>;\s*rel="([^"]+)"/);
        if (m && m[2] === rel) return m[1];
    }
    return null;
}

// GitHub API helper
// === BEGIN GitHubAPI === (marker — used by tests to extract this object literal)
const GitHubAPI = {
    baseUrl: 'https://api.github.com',
    
    parseRepoInput(input) {
        // Handle various formats:
        // - owner/repo
        // - https://github.com/owner/repo
        // - github.com/owner/repo
        // - https://github.com/owner/repo/pulls
        const cleaned = input.trim().replace(/\/$/, '');
        
        // Try URL format
        const urlMatch = cleaned.match(/(?:https?:\/\/)?(?:www\.)?github\.com\/([^\/]+)\/([^\/]+)/);
        if (urlMatch) {
            return { owner: urlMatch[1], repo: urlMatch[2].replace(/\.git$/, '') };
        }
        
        // Try owner/repo format
        const simpleMatch = cleaned.match(/^([^\/]+)\/([^\/]+)$/);
        if (simpleMatch) {
            return { owner: simpleMatch[1], repo: simpleMatch[2] };
        }
        
        return null;
    },
    
    async request(endpoint, token, options = {}) {
        const headers = {
            'Accept': 'application/vnd.github+json',
            'X-GitHub-Api-Version': '2022-11-28',
            ...options.headers,
        };

        // Only add Authorization header if token is provided
        if (token) {
            headers['Authorization'] = `Bearer ${token}`;
        }

        // Add Content-Type for requests with body
        if (options.body) {
            headers['Content-Type'] = 'application/json';
        }

        console.log(`[GitHub API] ${options.method || 'GET'} ${endpoint}`);

        const response = await fetch(`${this.baseUrl}${endpoint}`, {
            ...options,
            headers,
        });

        if (!response.ok) {
            const error = await response.json().catch(() => ({}));
            console.error(`[GitHub API] Error:`, error);
            // Include detailed error info if available
            let errorMsg = error.message || `GitHub API error: ${response.status}`;
            if (error.errors && error.errors.length > 0) {
                const details = error.errors.map(e => e.message || e.code || JSON.stringify(e)).join(', ');
                errorMsg += ` (${details})`;
                console.error(`[GitHub API] Error details:`, error.errors);
            }
            const err = new Error(errorMsg);
            err.status = response.status;
            err.data = error;
            throw err;
        }

        if (response.status === 204) return null;
        if (options._returnResponse) {
            const json = await response.json();
            return { data: json, headers: response.headers };
        }
        return response.json();
    },

    // Paginate a list endpoint by following the Link header. Caps at maxPages
    // to keep edge cases (huge label sets) bounded. Returns flat array.
    async paginate(endpoint, token, { perPage = 100, maxPages = 10 } = {}) {
        const sep = endpoint.includes('?') ? '&' : '?';
        let url = `${endpoint}${sep}per_page=${perPage}&page=1`;
        const all = [];
        for (let page = 1; page <= maxPages; page++) {
            const { data, headers } = await this.request(url, token, { _returnResponse: true });
            if (Array.isArray(data)) all.push(...data); else return data;
            const link = headers && headers.get && headers.get('link');
            const next = parseLinkHeader(link, 'next');
            if (!next) break;
            // Strip baseUrl so request() can prepend it again.
            url = next.startsWith(this.baseUrl) ? next.slice(this.baseUrl.length) : next;
        }
        return all;
    },
    
    async getPullRequests(owner, repo, state = 'open', token = null) {
        // Token optional - needed for private repos
        return this.request(`/repos/${owner}/${repo}/pulls?state=${state}&per_page=100`, token);
    },
    
    async getPullRequestReviews(owner, repo, prNumber, token = null) {
        // Token optional - needed for private repos
        return this.request(`/repos/${owner}/${repo}/pulls/${prNumber}/reviews`, token);
    },
    
    async approvePR(owner, repo, prNumber, token, comment = '', commitSha = null) {
        const body = {
            event: 'APPROVE',
        };
        
        // Only include body if there's a comment
        if (comment && comment.trim()) {
            body.body = comment.trim();
        }
        
        // Include commit_id if provided (required by some GitHub configurations)
        if (commitSha) {
            body.commit_id = commitSha;
        }
        
        console.log(`[GitHub API] Approving PR #${prNumber} with body:`, body);
        
        return this.request(`/repos/${owner}/${repo}/pulls/${prNumber}/reviews`, token, {
            method: 'POST',
            body: JSON.stringify(body),
        });
    },
    
    async removeLabel(owner, repo, issueNumber, labelName, token) {
        try {
            return this.request(
                `/repos/${owner}/${repo}/issues/${issueNumber}/labels/${encodeURIComponent(labelName)}`,
                token,

            );
        } catch (e) {
            // Label might not exist, that's okay
            console.warn(`Could not remove label ${labelName}:`, e.message);
            return null;
        }
    },
    
    async validateToken(token) {
        return this.request('/user', token);
    },
    
    generateJWT(appId, privateKey) {
        // Create JWT for GitHub App authentication
        const now = Math.floor(Date.now() / 1000);
        const payload = {
            iat: now - 60, // Issued 60 seconds ago to account for clock drift
            exp: now + (10 * 60), // Expires in 10 minutes (max allowed)
            iss: String(appId),
        };
        
        const header = { alg: 'RS256', typ: 'JWT' };
        
        console.log('[GitHub App] Generating JWT for App ID:', appId);
        console.log('[GitHub App] Key format detected:', 
            privateKey.includes('BEGIN RSA PRIVATE KEY') ? 'PKCS#1 (RSA)' :
            privateKey.includes('BEGIN PRIVATE KEY') ? 'PKCS#8' :
            privateKey.includes('BEGIN EC PRIVATE KEY') ? 'EC' : 'Unknown'
        );
        
        try {
            // Use jsrsasign to sign the JWT
            // jsrsasign accepts PEM strings directly
            const jwt = KJUR.jws.JWS.sign('RS256', JSON.stringify(header), JSON.stringify(payload), privateKey);
            console.log('[GitHub App] JWT generated successfully, length:', jwt.length);
            console.log('[GitHub App] JWT preview:', jwt.substring(0, 50) + '...');
            return jwt;
        } catch (e) {
            console.error('[GitHub App] JWT generation failed:', e);
            console.error('[GitHub App] Key starts with:', privateKey.substring(0, 100));
            throw new Error(`Failed to generate JWT: ${e.message}. Make sure the private key is in valid PEM format (PKCS#1 RSA or PKCS#8).`);
        }
    },
    
    async getAppInstallations(jwt) {
        console.log('[GitHub API] Getting app installations');
        const response = await fetch(`${this.baseUrl}/app/installations`, {
            headers: {
                'Accept': 'application/vnd.github+json',
                'Authorization': `Bearer ${jwt}`,
                'X-GitHub-Api-Version': '2022-11-28',
            },
        });
        
        if (!response.ok) {
            const error = await response.json().catch(() => ({}));
            console.error('[GitHub API] Get installations error:', error);
            throw new Error(error.message || `Failed to get installations: ${response.status}`);
        }
        
        const installations = await response.json();
        console.log(`[GitHub API] Found ${installations.length} installation(s)`);
        return installations;
    },
    
    async getInstallationToken(jwt, installationId) {
        console.log(`[GitHub API] Getting installation token for installation ${installationId}`);
        const response = await fetch(`${this.baseUrl}/app/installations/${installationId}/access_tokens`, {
            method: 'POST',
            headers: {
                'Accept': 'application/vnd.github+json',
                'Authorization': `Bearer ${jwt}`,
                'X-GitHub-Api-Version': '2022-11-28',
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({}),
        });
        
        if (!response.ok) {
            const error = await response.json().catch(() => ({}));
            console.error(`[GitHub API] Installation token error:`, error);
            throw new Error(error.message || `Failed to get installation token: ${response.status}`);
        }
        
        return response.json();
    },
    
    async getInstallationForRepo(jwt, owner, repo) {
        // Try to get the installation for this specific repo
        try {
            const response = await fetch(`${this.baseUrl}/repos/${owner}/${repo}/installation`, {
                headers: {
                    'Accept': 'application/vnd.github+json',
                    'Authorization': `Bearer ${jwt}`,
                    'X-GitHub-Api-Version': '2022-11-28',
                },
            });
            
            if (response.ok) {
                return response.json();
            }
        } catch (e) {
            // Fall through to get all installations
        }
        
        // If that fails, get all installations and find a matching one
        const installations = await this.getAppInstallations(jwt);
        if (installations.length === 0) {
            throw new Error('No installations found for this GitHub App');
        }
        
        // Return the first installation (user might need to select if multiple)
        return installations[0];
    },
    
    async authenticateAsApp(appId, privateKey, owner, repo) {
        // Normalize the private key - handle different line endings and formats
        let normalizedKey = privateKey.trim();
        
        // If the key doesn't have proper line breaks, try to fix it
        if (!normalizedKey.includes('\n') && normalizedKey.includes('-----BEGIN')) {
            // Key might be on a single line or have escaped newlines
            normalizedKey = normalizedKey
                .replace(/\\n/g, '\n')
                .replace(/-----BEGIN (RSA |EC )?PRIVATE KEY-----/g, '-----BEGIN $1PRIVATE KEY-----\n')
                .replace(/-----END (RSA |EC )?PRIVATE KEY-----/g, '\n-----END $1PRIVATE KEY-----');
        }
        
        console.log('[GitHub App] Normalized key starts with:', normalizedKey.substring(0, 50));
        
        const jwt = this.generateJWT(appId, normalizedKey);
        console.log('[GitHub App] JWT generated, length:', jwt.length);
        
        const installation = await this.getInstallationForRepo(jwt, owner, repo);
        console.log('[GitHub App] Found installation:', installation.id, 'for account:', installation.account?.login);
        
        const tokenData = await this.getInstallationToken(jwt, installation.id);
        console.log('[GitHub App] Got installation token, expires:', tokenData.expires_at);
        
        return {
            token: tokenData.token,
            expiresAt: tokenData.expires_at,
            installation: installation,
        };
    },

    // ---------------- Repository metadata ----------------

    async getRepository(owner, repo, token = null) {
        return this.request(`/repos/${owner}/${repo}`, token);
    },

    async getPullRequest(owner, repo, prNumber, token = null) {
        return this.request(`/repos/${owner}/${repo}/pulls/${prNumber}`, token);
    },

    // ---------------- Labels: repo-level ----------------

    async listRepoLabels(owner, repo, token = null) {
        return this.paginate(`/repos/${owner}/${repo}/labels`, token, { perPage: 100, maxPages: 10 });
    },

    async createRepoLabel(owner, repo, { name, color, description }, token) {
        return this.request(`/repos/${owner}/${repo}/labels`, token, {
            method: 'POST',
            body: JSON.stringify({ name, color, description }),
        });
    },

    async updateRepoLabel(owner, repo, currentName, { new_name, color, description }, token) {
        const body = {};
        if (new_name !== undefined) body.new_name = new_name;
        if (color !== undefined) body.color = color;
        if (description !== undefined) body.description = description;
        return this.request(`/repos/${owner}/${repo}/labels/${encodeURIComponent(currentName)}`, token, {
            method: 'PATCH',
            body: JSON.stringify(body),
        });
    },

    async deleteRepoLabel(owner, repo, name, token) {
        return this.request(`/repos/${owner}/${repo}/labels/${encodeURIComponent(name)}`, token, {
            method: 'DELETE',
        });
    },

    // ---------------- Labels: per-issue (PRs) ----------------

    async addLabelsToIssue(owner, repo, issueNumber, labels, token) {
        return this.request(`/repos/${owner}/${repo}/issues/${issueNumber}/labels`, token, {
            method: 'POST',
            body: JSON.stringify({ labels }),
        });
    },

    async setIssueLabels(owner, repo, issueNumber, labels, token) {
        return this.request(`/repos/${owner}/${repo}/issues/${issueNumber}/labels`, token, {
            method: 'PUT',
            body: JSON.stringify({ labels }),
        });
    },

    // ---------------- Merge ----------------

    // Returns { allowed: ['merge'|'squash'|'rebase'], default: <strategy> } based on repo settings.
    repoAllowedMergeStrategies(repository) {
        const allowed = [];
        if (!repository) return { allowed: ['merge', 'squash', 'rebase'], default: 'merge' };
        // GitHub omits these fields for some accounts; default to permissive.
        const merge = repository.allow_merge_commit !== false;
        const squash = repository.allow_squash_merge !== false;
        const rebase = repository.allow_rebase_merge !== false;
        if (merge) allowed.push('merge');
        if (squash) allowed.push('squash');
        if (rebase) allowed.push('rebase');
        // GitHub doesn't expose a per-repo "default" merge strategy, so prefer
        // squash > merge > rebase (matches the most common org defaults).
        const order = ['squash', 'merge', 'rebase'];
        const def = order.find(s => allowed.includes(s)) || allowed[0] || 'merge';
        return { allowed: allowed.length ? allowed : ['merge'], default: def };
    },

    async mergePullRequest(owner, repo, prNumber, { merge_method, commit_title, commit_message, sha }, token) {
        const body = { merge_method };
        if (commit_title) body.commit_title = commit_title;
        if (commit_message) body.commit_message = commit_message;
        if (sha) body.sha = sha;
        return this.request(`/repos/${owner}/${repo}/pulls/${prNumber}/merge`, token, {
            method: 'PUT',
            body: JSON.stringify(body),
        });
    },
};

    }, [token, authType]);
    
    // Get GitHub App installation token when needed
    const getAppToken = async () => {
        if (!appId || !privateKey || repos.length === 0) {

    // Get token for reading repos (returns null if not configured, which is fine for public repos)

        // Fetch reviews in parallel (batch of 5 to avoid rate limiting)
        const batchSize = 5;
        for (let i = 0; i < pullRequests.length; i += batchSize) {
            const batch = pullRequests.slice(i, i + batchSize);
            const results = await Promise.all(
                batch.map(async (pr) => {
                    try {
                        // Try with auth token, fallback to no token for public repos
                        const readToken = getReadToken();
                        let prReviews;
                        try {
                            prReviews = await GitHubAPI.getPullRequestReviews(pr._repo.owner, pr._repo.repo, pr.number, readToken);
                        } catch (authError) {
                            if (readToken && (authError.message.includes('401') || authError.message.includes('403') || authError.message.includes('Bad credentials'))) {
                                prReviews = await GitHubAPI.getPullRequestReviews(pr._repo.owner, pr._repo.repo, pr.number, null);
                            } else {
                                throw authError;
                            }
                        }
                        // Get the latest review state per user
                        const reviewerStates = {};
                        prReviews.forEach(review => {
                            if (review.state !== 'COMMENTED' && review.state !== 'PENDING') {
                                reviewerStates[review.user.login] = {
                                    state: review.state,
                                    user: review.user,
                                    submitted_at: review.submitted_at
                                };
                            }
                        });
                        
                        const approvers = Object.values(reviewerStates)
                            .filter(r => r.state === 'APPROVED')
                            .map(r => r.user);
                        
                        const hasChangesRequested = Object.values(reviewerStates)
                            .some(r => r.state === 'CHANGES_REQUESTED');
                        
                        return {
                            prKey: pr._key,
                            approved: approvers.length > 0,
                            approvers,
                            hasChangesRequested,
                            reviewCount: Object.keys(reviewerStates).length
                        };
                    } catch (e) {
                        console.error(`Failed to fetch reviews for PR ${pr._key}:`, e);
                        return { prKey: pr._key, approved: false, approvers: [], hasChangesRequested: false, reviewCount: 0 };
                    }
                })
            );
            
            results.forEach(r => {

        setPrReviews(reviews);

        setLabelEditorPR(pr);
        setLabelEditorSelected(new Set(pr.labels.map(l => l.name)));
        setLabelEditorNew('');
        await ensureRepoLabels(pr._repo.owner, pr._repo.repo);
    };

    // Save the per-PR label changes via PUT (replaces full list)
    const saveLabelEditor = async () => {
        if (!labelEditorPR) return;
        const authToken = await getAuthToken();
        if (!authToken) {
            showToast('Authentication required to edit labels', 'error');
            return;
        }
        setLabelEditorBusy(true);
        try {
            const desired = Array.from(labelEditorSelected);
            const updated = await GitHubAPI.setIssueLabels(
                labelEditorPR._repo.owner,
                labelEditorPR._repo.repo,
                labelEditorPR.number,
                desired,
                authToken
            );
            updateLocalPRLabels(labelEditorPR._key, updated || []);
            // Also refresh repo labels (PUT may have implicitly created new ones)
            const repoKey = `${labelEditorPR._repo.owner}/${labelEditorPR._repo.repo}`;
            try {
                const fresh = await GitHubAPI.listRepoLabels(labelEditorPR._repo.owner, labelEditorPR._repo.repo, authToken);
                setRepoLabels(prev => ({ ...prev, [repoKey]: fresh }));
            } catch (_) { /* non-fatal */ }
            showToast('Labels updated', 'success');
            setLabelEditorPR(null);
        } catch (e) {
            console.error('Failed to update labels', e);
            showToast(`Failed to update labels: ${e.message}`, 'error');
        } finally {
            setLabelEditorBusy(false);
        }
    };

    // Add (or create then add) a label from the editor's "new label" input.
    const addNewLabelFromEditor = async () => {
        const name = labelEditorNew.trim();
        if (!name) return;
        // Just toggle it into the selected set; PUT-on-save will create it server-side
        // if it doesn't exist yet (this is GitHub's behavior for the issues/labels PUT).
        const next = new Set(labelEditorSelected);
        next.add(name);
        setLabelEditorSelected(next);
        setLabelEditorNew('');
    };

    // ----- Repo-level label management -----

    const openLabelManager = async (repoInfo) => {
        setLabelManagerRepo(repoInfo);
        setLabelManagerEditing(null);
        setLabelManagerDraft({ name: '', color: '', description: '' });
        await ensureRepoLabels(repoInfo.owner, repoInfo.repo);
    };

    const startEditLabel = (label) => {
        setLabelManagerEditing(label.name);
        setLabelManagerDraft({
            name: label.name,
            color: label.color || '',
            description: label.description || '',
        });
    };

    const startCreateLabel = () => {
        setLabelManagerEditing('__new__');
        setLabelManagerDraft({ name: '', color: 'cccccc', description: '' });
    };

    const saveManagedLabel = async () => {
        if (!labelManagerRepo) return;
        const authToken = await getAuthToken();
        if (!authToken) {
            showToast('Authentication required to manage labels', 'error');
            return;
        }
        const { owner, repo } = labelManagerRepo;
        const repoKey = `${owner}/${repo}`;
        const draft = { ...labelManagerDraft };
        // Normalize hex color (strip leading # if present)
        if (draft.color && draft.color.startsWith('#')) draft.color = draft.color.slice(1);
        if (!draft.name.trim()) {
            showToast('Label name is required', 'error');
            return;
        }
        if (draft.color && !/^[0-9a-fA-F]{6}$/.test(draft.color)) {
            showToast('Color must be a 6-digit hex (e.g. ff7b72)', 'error');
            return;
        }
        setLabelManagerBusy(true);
        try {
            if (labelManagerEditing === '__new__') {
                await GitHubAPI.createRepoLabel(owner, repo, {
                    name: draft.name.trim(),
                    color: draft.color || 'cccccc',
                    description: draft.description || '',
                }, authToken);
                showToast(`Label "${draft.name}" created`, 'success');
            } else {
                const original = labelManagerEditing;
                await GitHubAPI.updateRepoLabel(owner, repo, original, {
                    new_name: draft.name.trim() !== original ? draft.name.trim() : undefined,
                    color: draft.color || undefined,
                    description: draft.description !== undefined ? draft.description : undefined,
                }, authToken);
                showToast(`Label "${original}" updated`, 'success');
                // If renamed, update PRs that referenced the old name (local state only —
                // GitHub's PATCH on the label updates references server-side automatically).
                if (draft.name.trim() !== original) {
                    setAllPRs(prev => prev.map(pr => {
                        if (pr._repo.owner !== owner || pr._repo.repo !== repo) return pr;
                        return {
                            ...pr,
                            labels: pr.labels.map(l => l.name === original ? { ...l, name: draft.name.trim() } : l),
                        };
                    }));
                }
            }
            // Refresh repo labels
            const fresh = await GitHubAPI.listRepoLabels(owner, repo, authToken);
            setRepoLabels(prev => ({ ...prev, [repoKey]: fresh }));
            setLabelManagerEditing(null);
        } catch (e) {
            console.error('Failed to save label', e);
            // Surface conflict on duplicate name (422)
            const detail = e.status === 422 ? ' (a label with this name may already exist)' : '';
            showToast(`Failed to save label: ${e.message}${detail}`, 'error');
        } finally {
            setLabelManagerBusy(false);
        }
    };

    const deleteManagedLabel = async (labelName) => {
        if (!labelManagerRepo) return;
        if (!confirm(`Delete label "${labelName}" from the repository? This removes it from all issues and PRs.`)) return;
        const authToken = await getAuthToken();
        if (!authToken) {
            showToast('Authentication required to manage labels', 'error');
            return;
        }
        const { owner, repo } = labelManagerRepo;
        const repoKey = `${owner}/${repo}`;
        setLabelManagerBusy(true);
        try {
            await GitHubAPI.deleteRepoLabel(owner, repo, labelName, authToken);
            const fresh = await GitHubAPI.listRepoLabels(owner, repo, authToken);
            setRepoLabels(prev => ({ ...prev, [repoKey]: fresh }));
            // Strip from any local PR that had it
            setAllPRs(prev => prev.map(pr => {
                if (pr._repo.owner !== owner || pr._repo.repo !== repo) return pr;
                return { ...pr, labels: pr.labels.filter(l => l.name !== labelName) };
            }));
            showToast(`Label "${labelName}" deleted`, 'success');
        } catch (e) {
            console.error('Failed to delete label', e);
            showToast(`Failed to delete label: ${e.message}`, 'error');
        } finally {
            setLabelManagerBusy(false);
        }
    };

    // ---------------- Merge ----------------

    const openMergeModal = async (pr) => {
        setMergePR(pr);
        setMergeDetails(null);
        setMergeError(null);
        setMergeDone(false);
        setMergeCommitTitle('');
        setMergeCommitMessage('');
        setMergeChecking(true);
        try {
            const [details, repoMeta] = await Promise.all([
                GitHubAPI.getPullRequest(pr._repo.owner, pr._repo.repo, pr.number, getReadToken()),
                GitHubAPI.getRepository(pr._repo.owner, pr._repo.repo, getReadToken()).catch(() => null),
            ]);
            // GitHub may return mergeable === null briefly while the merge commit is being computed.
            // Poll once after a short delay if so.
            let resolved = details;
            if (resolved.mergeable === null) {
                await new Promise(r => setTimeout(r, 1500));
                resolved = await GitHubAPI.getPullRequest(pr._repo.owner, pr._repo.repo, pr.number, getReadToken());
            }
            setMergeDetails(resolved);
            const strategies = GitHubAPI.repoAllowedMergeStrategies(repoMeta);
            setMergeAllowed(strategies.allowed);
            setMergeStrategy(strategies.default);
            setMergeCommitTitle(`${resolved.title} (#${resolved.number})`);
        } catch (e) {
            console.error('Failed to load merge details', e);
            setMergeError(e.message);
        } finally {
            setMergeChecking(false);
        }
    };

    const closeMergeModal = () => {
        if (mergeBusy) return;
        setMergePR(null);
        setMergeDetails(null);
        setMergeError(null);
        setMergeDone(false);
    };

    const performMerge = async () => {
        if (!mergePR || !mergeDetails) return;
        const authToken = await getAuthToken();
        if (!authToken) {
            setMergeError('Authentication required to merge.');
            return;
        }
        setMergeBusy(true);
        setMergeError(null);
        try {
            const result = await GitHubAPI.mergePullRequest(
                mergePR._repo.owner,
                mergePR._repo.repo,
                mergePR.number,
                {
                    merge_method: mergeStrategy,
                    commit_title: mergeCommitTitle.trim() || undefined,
                    commit_message: mergeCommitMessage.trim() || undefined,
                    sha: mergeDetails.head?.sha,
                },
                authToken
            );
            // Refresh local PR state — when an open PR is merged it leaves the open list,
            // so simply remove it from `allPRs`.
            setAllPRs(prev => prev.filter(p => p._key !== mergePR._key));
            setSelectedPRs(prev => {
                const next = new Set(prev);
                next.delete(mergePR._key);
                return next;
            });
            setMergeDone(true);
            showToast(`Merged #${mergePR.number} (${result?.sha?.slice(0, 7) || ''})`, 'success');
        } catch (e) {
            console.error('Merge failed', e);
            // Surface known-blocker statuses with more context.
            let msg = e.message || 'Merge failed';
            if (e.status === 405) msg = `Pull request is not mergeable: ${msg}`;
            if (e.status === 409) msg = `Branch state changed since loading. Refresh and retry. (${msg})`;
            if (e.status === 403) msg = `Insufficient permissions or branch protection blocked the merge. (${msg})`;
            setMergeError(msg);
        } finally {
            setMergeBusy(false);
        }
    };

    // ---------------- Bulk Merge ----------------

    // Open the bulk-merge modal: precompute the intersection of merge strategies
    // allowed across all repos involved in the selection.
    const openBulkMerge = async () => {
        if (selectedPRs.size === 0) return;
        setShowBulkMerge(true);
        setBulkMergeProgress({ current: 0, total: 0, results: [] });

        const selectedRepos = new Map(); // "owner/repo" -> {owner, repo}
        for (const key of selectedPRs) {
            const pr = allPRs.find(p => p._key === key);
            if (pr) selectedRepos.set(`${pr._repo.owner}/${pr._repo.repo}`, pr._repo);
        }
        try {
            const repoMetas = await Promise.all(
                Array.from(selectedRepos.values()).map(r =>
                    GitHubAPI.getRepository(r.owner, r.repo, getReadToken()).catch(() => null)
                )
            );
            // Intersect allowed strategies — the bulk operation must use a single
            // strategy, so it has to be one that every involved repo permits.
            let intersection = ['merge', 'squash', 'rebase'];
            for (const meta of repoMetas) {
                const { allowed } = GitHubAPI.repoAllowedMergeStrategies(meta);
                intersection = intersection.filter(s => allowed.includes(s));
            }
            if (intersection.length === 0) intersection = ['merge'];
            setBulkMergeAllowed(intersection);
            // Default to squash if available, else first allowed.
            setBulkMergeStrategy(intersection.includes('squash') ? 'squash' : intersection[0]);
        } catch (e) {
            console.error('Failed to inspect repo merge settings', e);
            setBulkMergeAllowed(['merge', 'squash', 'rebase']);
            setBulkMergeStrategy('merge');
        }
    };

    const closeBulkMerge = () => {
        if (bulkMergeRunning) return;
        setShowBulkMerge(false);
        setBulkMergeProgress({ current: 0, total: 0, results: [] });
    };

    const runBulkMerge = async () => {
        if (selectedPRs.size === 0) return;
        const authToken = await getAuthToken();
        if (!authToken) {
            showToast('Authentication failed. Please check your credentials.', 'error');
            return;
        }
        setBulkMergeRunning(true);
        const prKeys = Array.from(selectedPRs);
        setBulkMergeProgress({ current: 0, total: prKeys.length, results: [] });
        const results = [];
        const mergedKeys = [];

        for (let i = 0; i < prKeys.length; i++) {
            const prKey = prKeys[i];
            const pr = allPRs.find(p => p._key === prKey);
            if (!pr) {
                results.push({ prKey, title: 'Unknown', success: false, error: 'PR not found' });
                setBulkMergeProgress({ current: i + 1, total: prKeys.length, results: [...results] });
                continue;
            }
            const repoLabel = `${pr._repo.owner}/${pr._repo.repo}`;
            try {
                // Fetch full details for mergeability + head SHA. Poll once if GitHub is
                // still computing the merge state (mergeable === null).
                let details = await GitHubAPI.getPullRequest(pr._repo.owner, pr._repo.repo, pr.number, authToken);
                if (details.mergeable === null) {
                    await new Promise(r => setTimeout(r, 1500));
                    details = await GitHubAPI.getPullRequest(pr._repo.owner, pr._repo.repo, pr.number, authToken);
                }
                if (details.mergeable !== true) {
                    const reason = details.mergeable_state || 'not mergeable';
                    results.push({
                        prKey,
                        prNumber: pr.number,
                        repo: repoLabel,
                        title: pr.title,
                        success: false,
                        skipped: true,
                        error: `Skipped — state: ${reason}`,
                    });
                } else {
                    const result = await GitHubAPI.mergePullRequest(
                        pr._repo.owner,
                        pr._repo.repo,
                        pr.number,
                        {
                            merge_method: bulkMergeStrategy,
                            commit_title: `${details.title} (#${details.number})`,
                            sha: details.head?.sha,
                        },
                        authToken
                    );
                    mergedKeys.push(prKey);
                    results.push({
                        prKey,
                        prNumber: pr.number,
                        repo: repoLabel,
                        title: pr.title,
                        success: true,
                        sha: result?.sha,
                    });
                }
            } catch (e) {
                console.error(`[Bulk merge] ${prKey} failed:`, e);
                let msg = e.message || 'Merge failed';
                if (e.status === 405) msg = `Not mergeable: ${msg}`;
                if (e.status === 409) msg = `Branch state changed since loading: ${msg}`;
                if (e.status === 403) msg = `Permissions or branch protection blocked the merge: ${msg}`;
                results.push({
                    prKey,
                    prNumber: pr.number,
                    repo: repoLabel,
                    title: pr.title,
                    success: false,
                    error: msg,
                });
            }
            setBulkMergeProgress({ current: i + 1, total: prKeys.length, results: [...results] });
        }

        // Remove successfully-merged PRs from the open list and clear them from selection.
        if (mergedKeys.length > 0) {
            const mergedSet = new Set(mergedKeys);
            setAllPRs(prev => prev.filter(p => !mergedSet.has(p._key)));
            setSelectedPRs(prev => {
                const next = new Set(prev);
                for (const k of mergedKeys) next.delete(k);
                return next;
            });
        }

        const successCount = results.filter(r => r.success).length;
        showToast(
            `Merged ${successCount} of ${results.length} PRs`,
            successCount === results.length ? 'success' : 'error'
        );
        setBulkMergeRunning(false);
        // Auto-close after a moment so the user can read the results, matching the approve flow.
        setTimeout(() => {
            setShowBulkMerge(false);
            setBulkMergeProgress({ current: 0, total: 0, results: [] });
        }, 3500);
    };
    
    // Count PRs missing approval
    const missingApprovalCount = allPRs.filter(pr => {
        const review = prReviews[pr._key];
        return !review || !review.approved;
    }).length;
    
    // Count PRs with needs-review label
    const needsReviewCount = allPRs.filter(pr => 
        pr.labels.some(l => l.name.toLowerCase() === 'needs-review')
    ).length;

    // Approve selected PRs
    const approveSelected = async () => {
        if (selectedPRs.size === 0) return;
        
        // Get auth token first
        const authToken = await getAuthToken();
        if (!authToken) {
            showToast('Authentication failed. Please check your credentials.', 'error');
            return;
        }

        setApproving(true);
        setApprovalProgress({ current: 0, total: selectedPRs.size, results: [] });

        const prKeys = Array.from(selectedPRs);
        const results = [];

        for (let i = 0; i < prKeys.length; i++) {
            const prKey = prKeys[i];
            const pr = allPRs.find(p => p._key === prKey);
            
            if (!pr) {
                results.push({ prKey, title: 'Unknown', success: false, error: 'PR not found' });
                continue;
            }
            
            try {
                console.log(`[Approve] Approving ${prKey}...`);
                // Get the commit SHA from the PR (required for approval)
                const commitSha = pr?.head?.sha;
                console.log(`[Approve] ${prKey} HEAD SHA: ${commitSha}`);
                
                // Use the comment or empty string if cleared
                const comment = approvalComment.trim();
                
                // Approve the PR
                await GitHubAPI.approvePR(pr._repo.owner, pr._repo.repo, pr.number, authToken, comment, commitSha);
                console.log(`[Approve] ${prKey} approved successfully`);
                
                // Remove needs-review label if requested (don't fail if label doesn't exist)
                let labelRemoved = false;
                if (removeNeedsReview) {
                    try {
                        console.log(`[Approve] Removing needs-review label from ${prKey}...`);
                        await GitHubAPI.removeLabel(pr._repo.owner, pr._repo.repo, pr.number, 'needs-review', authToken);
                        labelRemoved = true;
                        console.log(`[Approve] Label removed from ${prKey}`);
                    } catch (labelError) {
                        // Label removal is optional - don't fail the whole operation
                        console.warn(`[Approve] Could not remove label from ${prKey}:`, labelError.message);
                    }
                }
                
                results.push({ 
                    prKey,
                    prNumber: pr.number,
                    repo: `${pr._repo.owner}/${pr._repo.repo}`,
                    title: pr?.title, 
                    success: true,
                    labelRemoved: removeNeedsReview ? labelRemoved : null
                });
            } catch (e) {
                console.error(`[Approve] Failed to approve ${prKey}:`, e);
                results.push({ 
                    prKey, 
                    prNumber: pr.number,
                    repo: `${pr._repo.owner}/${pr._repo.repo}`,
                    title: pr?.title, 
                    success: false, 
                    error: e.message 
                });
            }

            setApprovalProgress({ current: i + 1, total: prKeys.length, results });
        }

        const successCount = results.filter(r => r.success).length;
        showToast(`Approved ${successCount} of ${results.length} PRs`, successCount === results.length ? 'success' : 'error');
        
        // Refresh PRs from all repos
        if (repos.length > 0) {
            fetchPRs();
        }

        setSelectedPRs(new Set());
        setApproving(false);
        
        // Keep modal visible for 2.5 seconds so user can see results, then auto-close
        setTimeout(() => {
            setShowModal(false);
        }, 2500);
    };

    // Export PR list as Markdown
    const exportAsMarkdown = () => {
        const prsToExport = filteredPRs;
        if (prsToExport.length === 0) {
            showToast('No PRs to export', 'error');
            return;
        }
        
        const now = new Date().toISOString().split('T')[0];
        let md = `# Pull Requests Export\n\n`;
        md += `**Date:** ${now}\n`;
        md += `**Total PRs:** ${prsToExport.length}\n\n`;
        
        // Group by repo if multiple repos
        const byRepo = {};
        prsToExport.forEach(pr => {
            const repoKey = `${pr._repo.owner}/${pr._repo.repo}`;
            if (!byRepo[repoKey]) byRepo[repoKey] = [];
            byRepo[repoKey].push(pr);
        });
        
        Object.entries(byRepo).forEach(([repoName, prs]) => {
            md += `## ${repoName}\n\n`;
            md += `| # | Title | Author | Status | Labels | Created |\n`;
            md += `|---|-------|--------|--------|--------|--------|\n`;
            
            prs.forEach(pr => {
                const review = prReviews[pr._key];
                const status = review 
                    ? (review.approved ? '✅ Approved' : review.hasChangesRequested ? '❌ Changes Requested' : '⏳ Awaiting Review')
                    : '⏳ Awaiting Review';
                const labels = pr.labels.map(l => `\`${l.name}\``).join(', ') || '-';
                const created = new Date(pr.created_at).toLocaleDateString();
                const title = pr.title.replace(/\|/g, '\\|').substring(0, 60) + (pr.title.length > 60 ? '...' : '');
                
                md += `| [#${pr.number}](${pr.html_url}) | ${title} | @${pr.user.login} | ${status} | ${labels} | ${created} |\n`;
            });
            
            md += `\n`;
        });
        
        // Download the file
        const blob = new Blob([md], { type: 'text/markdown' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `pr-export-${now}.md`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        
        showToast(`Exported ${prsToExport.length} PRs to Markdown`, 'success');
    };

    const filteredPRs = getFilteredPRs();

    return (
        <div className="app">
            {/* Header - App Name */}
            <header className="header">
                <div className="logo">
                    <div className="logo-mark">✓</div>
                    <span className="logo-text" style={{ color: 'var(--acc)' }}>PR Manager</span>
                    <span className="logo-sub">Approve, label, and merge GitHub PRs</span>
                </div>

                {(user || appToken) && (
                    <div 
                        style={{ 
                            display: 'flex', 
                            alignItems: 'center', 
                            gap: 8, 
                            padding: '8px 12px',
                            background: 'var(--green-bg)',
                            borderRadius: 8,
                            fontSize: 11,
                            color: 'var(--green)',
                            cursor: 'pointer',
                            transition: 'all 0.2s'
                        }}
                        onClick={() => {
                            if (user) {
                                setToken('');
                                setUser(null);
                                localStorage.removeItem('gh_token');
                                showToast('Signed out', 'success');
                            }
                            if (appToken) {
                                setAppToken(null);
                                setAppId('');
                                setPrivateKey('');
                                localStorage.removeItem('gh_app_id');
                                localStorage.removeItem('gh_private_key');
                                showToast('GitHub App disconnected', 'success');
                            }
                        }}
                        title="Click to sign out"
                    >
                        {user ? (
                            <>✓ Signed in as <strong>{user.login}</strong> <span style={{ opacity: 0.7 }}>(click to sign out)</span></>
                        ) : (
                            <>🤖 GitHub App authenticated <span style={{ opacity: 0.7 }}>(click to disconnect)</span></>
                        )}
                    </div>
                )}
            </header>

            {/* Toolbar - Repository Inputs */}
            <div className="toolbar">
                <div style={{ display: 'flex', gap: 16, alignItems: 'flex-start', flexWrap: 'wrap' }}>
                    <div style={{ flex: 1, minWidth: 300 }}>
                        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 8 }}>
                            <label className="input-label">Repositories</label>
                            <button
                                className="btn"
                                style={{ 
                                    padding: '4px 8px', 
                                    fontSize: 10,
                                    opacity: (token || appToken) ? 1 : 0.7
                                }}
                                onClick={() => setShowAuthConfig(true)}
                                title="Configure authentication for private repos"
                            >
                                🔐 {(token || appToken) ? 'Auth ✓' : 'Private repos'}
                            </button>
                        </div>
                        <div className="repo-inputs-container">
                            {repoInputs.map((input, index) => (
                                <div key={index} style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
                                    <input
                                        type="text"
                                        className="input-field"
                                        style={{ minWidth: 240, flex: 1 }}
                                        placeholder="owner/repo or GitHub URL"
                                        value={input}
                                        onChange={(e) => updateRepoInput(index, e.target.value)}
                                        onKeyDown={(e) => {
                                            if (e.key === 'Enter') {
                                                e.preventDefault();
                                                fetchPRs();
                                            }
                                        }}
                                    />
                                    <button
                                        className="btn"
                                        style={{ padding: '8px 10px', minWidth: 32 }}
                                        onClick={() => removeRepoInput(index)}
                                        title="Remove repository"
                                    >
                                        −
                                    </button>
                                    {index === repoInputs.length - 1 && (
                                        <button
                                            className="btn"
                                            style={{ padding: '8px 10px', minWidth: 32, color: 'var(--green)' }}
                                            onClick={addRepoInput}
                                            title="Add repository"
                                        >
                                            +
                                        </button>
                                    )}
                                </div>
                            ))}
                        </div>
                    </div>

                    <button className="btn primary" onClick={fetchPRs} disabled={loading} style={{ marginTop: 24 }}>
                        {loading ? '⏳' : '🔍'} Load PRs
                    </button>
                </div>
            </div>

            {/* Main Content */}
            <main className="main">
                {error && (
                    <div className="error-box">
                        <span className="error-icon">⚠️</span>
                        <div className="error-content">
                            <div className="error-title">Error</div>
                            <div className="error-msg">{error}</div>
                        </div>
                        <button className="btn" onClick={() => setError(null)} style={{ marginLeft: 'auto' }}>Dismiss</button>
                    </div>
                )}

                {repos.length === 0 && !loading && (
                    <div className="welcome">
                        <div className="welcome-icon">🚀</div>
                        <h1 className="welcome-title">Welcome to PR Manager</h1>

                            <div className="welcome-step">

                            <div className="stat-card">

                                <div className="stat-label">Open PRs</div>

                                <div className="stat-value">

                                <div className="stat-label">Missing Approval</div>
                            </div>
                            <div className="stat-card">
                                <div className="stat-value">{needsReviewCount}</div>
                                <div className="stat-label">needs-review label</div>
                            </div>
                            <div className="stat-card success">
                                <div className="stat-value">{selectedPRs.size}</div>
                                <div className="stat-label">Selected</div>
                            </div>
                        </div>

                        <div className="pr-header">

                            </h2>

                                <button
                                    className={`filter-btn ${compactView ? 'active' : ''}`}

                                <button
                                    className={`filter-btn ${filterMissingApproval ? 'active' : ''}`}
                                    onClick={() => setFilterMissingApproval(!filterMissingApproval)}
                                    disabled={loadingReviews}
                                >
                                    ⏳ Missing Approval ({loadingReviews ? '...' : missingApprovalCount})
                                </button>
                                <button
                                    className={`filter-btn ${filterNeedsReview ? 'active' : ''}`}
                                    onClick={() => setFilterNeedsReview(!filterNeedsReview)}
                                >
                                    🏷️ needs-review ({needsReviewCount})
                                </button>
                                <button
                                    className={`filter-btn ${labelFilter.size > 0 || showLabelFilter ? 'active' : ''}`}
                                    onClick={() => setShowLabelFilter(!showLabelFilter)}
                                    title="Filter by labels"

                                    🏷️ Labels{labelFilter.size > 0 ? ` (${labelFilter.size})` : ''}
                                </button>
                                {repos.length > 0 && (
                                    <button
                                        className="filter-btn"
                                        onClick={() => openLabelManager(repos[0])}
                                        title={repos.length > 1 ? `Manage labels for ${repos[0].owner}/${repos[0].repo}` : 'Manage repo labels'}

                                        ⚙️ Manage Labels
                                    </button>
                                )}

                                    onClick={exportAsMarkdown}
                                    disabled={filteredPRs.length === 0}

                                </button>

                                    className="btn primary"
                                    onClick={() => { setApprovalProgress({ current: 0, total: 0, results: [] }); setShowModal(true); }}

                                    ✅ Approve Selected ({selectedPRs.size})
                                </button>
                                <button
                                    className="btn primary"
                                    onClick={openBulkMerge}
                                    disabled={selectedPRs.size === 0 || !isAuthConfigured()}
                                    title={!isAuthConfigured() ? 'Configure authentication to merge' : ''}

                                </button>

                                        <button
                                            className="btn"
                                            style={{ fontSize: 10, padding: '4px 8px' }}
                                            onClick={() => setLabelFilter(new Set())}
                                        >
                                            Clear
                                        </button>
                                    )}
                                </div>

                                    <div style={{ fontSize: 11, color: 'var(--t3)' }}>
                                        No labels on the loaded PRs yet.

                                    <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>

                                                <button
                                                    key={label.id || label.name}
                                                    onClick={() => toggleLabelFilter(label.name)}
                                                    className="label"
                                                    style={{
                                                        cursor: 'pointer',
                                                        backgroundColor: active ? `#${label.color}66` : `#${label.color}22`,
                                                        color: `#${label.color}`,
                                                        borderColor: `#${label.color}`,
                                                        borderWidth: active ? 2 : 1,
                                                        borderStyle: 'solid',
                                                        outline: 'none',
                                                    }}
                                                >
                                                    {active ? '✓ ' : ''}{label.name}
                                                </button>
                                            );
                                        })}
                                    </div>
                                )}
                            </div>
                        )}

                        {filteredPRs.length === 0 ? (
                            <div className="empty-state">
                                <div className="empty-icon">📭</div>
                                <div className="empty-title">No pull requests found</div>

                                                checked={selectedPRs.has(pr._key)}
                                                onChange={() => {}}

                                                            color: 'var(--t3)',
                                                            background: 'var(--bg3)',
                                                            padding: '2px 6px',
                                                            borderRadius: 4
                                                        }}>
                                                            {pr._repo.owner}/{pr._repo.repo}
                                                        </span>
                                                    )}

                                                        <span style={{
                                                            padding: '2px 8px',
                                                            borderRadius: 12,
                                                            fontSize: 10,

                                                                : prReviews[pr._key].hasChangesRequested

                                                                ? 'var(--green)' 
                                                                : prReviews[pr._key].hasChangesRequested 
                                                                    ? 'var(--red)'
                                                                    : 'var(--orange)',
                                                        }}>
                                                            {prReviews[pr._key].approved 
                                                                ? `✓ Approved (${prReviews[pr._key].approvers.length})`

                                                                    : '⏳ Awaiting review'}

                                                            style={{
                                                                backgroundColor: `#${label.color}22`,
                                                                color: `#${label.color}`,
                                                                borderColor: `#${label.color}`,
                                                                padding: '2px 6px',
                                                                fontSize: 9,
                                                            }}
                                                        >
                                                            {label.name}
                                                        </span>
                                                    ))}
                                                </div>
                                                <div className="pr-name" style={compactView ? { fontSize: 13, marginTop: 4 } : {}}>
                                                    {pr.title}
                                                </div>

                                                        <div className="pr-meta">
                                                            <span className="pr-author">
                                                                <img 
                                                                    src={pr.user.avatar_url} 
                                                                    alt={pr.user.login}
                                                                    className="pr-author-avatar"
                                                                />

                                                            <span>📅 {new Date(pr.created_at).toLocaleDateString()}</span>
                                                            <span>💬 {pr.comments || 0}</span>
                                                            <span>📝 +{pr.additions || 0} -{pr.deletions || 0}</span>
                                                        </div>
                                                        {pr.labels.length > 0 && (
                                                            <div className="pr-labels">
                                                                {pr.labels.map(label => (
                                                                    <span
                                                                        key={label.id}
                                                                        className={`label ${label.name.toLowerCase() === 'needs-review' ? 'needs-review' : ''}`}
                                                                        style={{
                                                                            backgroundColor: `#${label.color}22`,
                                                                            color: `#${label.color}`,
                                                                            borderColor: `#${label.color}`,
                                                                        }}
                                                                    >
                                                                        {label.name}
                                                                    </span>
                                                                ))}
                                                            </div>
                                                        )}
                                                    </>
                                                )}
                                            </div>
                                            <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }} onClick={(e) => e.stopPropagation()}>
                                                <button
                                                    className="btn"
                                                    onClick={(e) => { e.stopPropagation(); openLabelEditor(pr); }}
                                                    style={{ fontSize: 11 }}
                                                    title="Edit labels"
                                                >
                                                    🏷️
                                                </button>
                                                <button
                                                    className="btn"
                                                    onClick={(e) => { e.stopPropagation(); openMergeModal(pr); }}
                                                    style={{ fontSize: 11 }}
                                                    title="Merge this PR"
                                                    disabled={!isAuthConfigured()}
                                                >
                                                    ⤴️
                                                </button>
                                                <a
                                                    href={pr.html_url}
                                                    target="_blank"
                                                    rel="noopener noreferrer"
                                                    className="btn"
                                                    onClick={(e) => e.stopPropagation()}
                                                    style={{ fontSize: 11 }}
                                                    title="Open on GitHub"
                                                >
                                                    🔗
                                                </a>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </>
                )}
            </main>

            {/* Auth Config Modal */}
            {showAuthConfig && (
                <div className="modal-overlay" onClick={() => setShowAuthConfig(false)}>
